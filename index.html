<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gemstones AR — معرض الأحجار الكريمة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    :root {
      --gold:#D4AF37; --gold-lt:#F5D76E; --gold-dim:rgba(212,175,55,0.14);
      --glass:rgba(8,8,18,0.85); --glass-b:rgba(212,175,55,0.22);
      --text:#f0ece0; --muted:rgba(240,236,224,0.46);
      --ease:0.38s cubic-bezier(0.22,1,0.36,1);
      --fn-en:'Cinzel',serif; --fn-ar:'Tajawal',sans-serif;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#07070f;color:var(--text);font-family:var(--fn-ar);-webkit-tap-highlight-color:transparent;user-select:none}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(212,175,55,0.06) 0%,transparent 60%),
                 radial-gradient(ellipse 60% 60% at 80% 80%,rgba(80,50,180,0.06) 0%,transparent 60%)}
    #app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column}
    #topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
      padding:14px 18px 10px;background:linear-gradient(to bottom,rgba(7,7,15,0.97),transparent);
      position:relative;z-index:10}
    .tb-logo{font-family:var(--fn-en);font-size:1.05rem;letter-spacing:4px;color:var(--gold);animation:logoGlow 4s ease-in-out infinite}
    @keyframes logoGlow{0%,100%{text-shadow:0 0 10px rgba(212,175,55,0.25)}50%{text-shadow:0 0 28px rgba(212,175,55,0.7)}}
    .tb-sub{font-size:0.68rem;color:var(--muted);letter-spacing:1px;margin-top:2px}
    #ar-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;background:var(--gold-dim);
      border:1px solid var(--glass-b);border-radius:50px;font-family:var(--fn-ar);font-size:0.82rem;
      color:var(--gold-lt);cursor:pointer;transition:background var(--ease),box-shadow var(--ease),opacity var(--ease),transform .15s}
    #ar-btn:hover:not(:disabled){background:rgba(212,175,55,0.28);box-shadow:0 0 20px rgba(212,175,55,0.2)}
    #ar-btn:active:not(:disabled){transform:scale(0.95)}
    #ar-btn:disabled{opacity:0.38;cursor:not-allowed;border-color:rgba(255,255,255,0.08);color:var(--muted)}
    #ar-btn svg{width:15px;height:15px;flex-shrink:0}
    #viewer-wrap{flex:1;position:relative;overflow:hidden}
    model-viewer{width:100%;height:100%;background-color:transparent;--poster-color:transparent}
    model-viewer::part(default-ar-button){display:none}
    model-viewer::part(default-progress-bar){display:none}
    #mv-loader{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:14px;
      background:rgba(7,7,15,0.65);backdrop-filter:blur(8px);
      transition:opacity .4s,visibility .4s}
    #mv-loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
    .ring{width:48px;height:48px;border:3px solid rgba(212,175,55,0.1);border-top-color:var(--gold);
      border-radius:50%;animation:spin 0.9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader-txt{font-size:0.78rem;color:var(--muted);letter-spacing:1px}
    .progress-wrap{width:140px;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
    #progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--gold-lt));border-radius:2px;transition:width .25s ease}
    #float-label{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:6;text-align:center;pointer-events:none}
    .fl-en{font-family:var(--fn-en);font-size:clamp(1.3rem,4.5vw,1.9rem);letter-spacing:4px;color:var(--gold);
      text-shadow:0 0 28px rgba(212,175,55,0.45);transition:color .4s,text-shadow .4s}
    .fl-ar{font-size:0.78rem;color:var(--muted);letter-spacing:1px;margin-top:2px}
    #status-badge{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:7;
      font-size:0.7rem;color:var(--muted);background:rgba(7,7,15,0.75);padding:5px 14px;
      border-radius:50px;border:1px solid rgba(255,255,255,0.07);pointer-events:none;
      white-space:nowrap;opacity:0;transition:opacity .4s}
    #status-badge.show{opacity:1}
    #info-panel{flex-shrink:0;position:relative;z-index:10}
    #info-toggle{position:absolute;top:-34px;left:50%;transform:translateX(-50%);width:72px;height:26px;
      background:var(--glass);border:1px solid var(--glass-b);border-bottom:none;border-radius:12px 12px 0 0;
      display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(14px)}
    .chevron{width:22px;height:3px;background:rgba(212,175,55,0.4);border-radius:2px;position:relative}
    .chevron::before,.chevron::after{content:'';position:absolute;width:12px;height:3px;
      background:rgba(212,175,55,0.4);border-radius:2px;top:-5px}
    .chevron::before{left:1px;transform:rotate(40deg);transform-origin:right}
    .chevron::after{right:1px;transform:rotate(-40deg);transform-origin:left}
    #info-panel.collapsed .chevron::before{top:5px;transform:rotate(-40deg);transform-origin:right}
    #info-panel.collapsed .chevron::after{top:5px;transform:rotate(40deg);transform-origin:left}
    #info-card{background:var(--glass);backdrop-filter:blur(24px) saturate(160%);
      -webkit-backdrop-filter:blur(24px) saturate(160%);border-top:1px solid var(--glass-b);
      padding:14px 18px 18px;display:flex;flex-direction:column;gap:12px;
      max-height:38vh;overflow-y:auto;transition:max-height var(--ease),padding var(--ease)}
    #info-panel.collapsed #info-card{max-height:0;padding-top:0;padding-bottom:0;overflow:hidden}
    .c-header{display:flex;align-items:center;gap:12px}
    .c-emoji{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;
      font-size:1.7rem;flex-shrink:0;transition:background .3s,box-shadow .3s}
    .c-titles{flex:1;min-width:0}
    .c-en{font-family:var(--fn-en);font-size:1.1rem;color:var(--gold);letter-spacing:2px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .c-ar{font-size:0.82rem;color:var(--muted);margin-top:2px}
    .c-desc{font-size:0.83rem;color:rgba(240,236,224,0.72);line-height:1.78;
      border-right:2px solid var(--glass-b);padding-right:10px}
    .c-stats{display:flex;gap:7px}
    .stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
      border-radius:10px;padding:8px 5px;text-align:center}
    .s-lbl{font-size:0.58rem;color:var(--muted);margin-bottom:3px}
    .s-val{font-size:0.88rem;font-weight:700}
    #gem-menu{flex-shrink:0;padding:8px 0 calc(8px + env(safe-area-inset-bottom));
      background:linear-gradient(to top,rgba(7,7,15,0.99),rgba(7,7,15,0.6));
      border-top:1px solid rgba(255,255,255,0.04);position:relative;z-index:10}
    .menu-scroll{display:flex;gap:8px;padding:0 14px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .menu-scroll::-webkit-scrollbar{display:none}
    .gem-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;
      padding:9px 12px;min-width:62px;border-radius:14px;border:1px solid rgba(255,255,255,0.06);
      background:rgba(255,255,255,0.03);cursor:pointer;position:relative;
      transition:background var(--ease),border-color var(--ease),box-shadow var(--ease),transform .15s}
    .gem-chip:active{transform:scale(0.93)}
    .gem-chip.active{border-color:var(--glass-b);background:var(--gold-dim);box-shadow:0 0 16px rgba(212,175,55,0.13)}
    .gem-chip.active::before{content:'';position:absolute;top:0;left:22%;right:22%;height:2px;
      border-radius:0 0 2px 2px;background:var(--chip-color,var(--gold))}
    .chip-em{font-size:1.5rem;line-height:1}
    .chip-lbl{font-family:var(--fn-en);font-size:0.58rem;letter-spacing:1px;color:var(--muted);text-align:center;transition:color var(--ease)}
    .gem-chip.active .chip-lbl{color:var(--gold-lt)}
    .chip-dot{width:3px;height:3px;border-radius:50%;background:var(--gold);opacity:0;transition:opacity .2s;position:absolute;bottom:4px}
    .gem-chip.active .chip-dot{opacity:1}
    #toast-wrap{position:fixed;top:76px;left:50%;transform:translateX(-50%);z-index:9000;pointer-events:none;display:flex;flex-direction:column;gap:7px;align-items:center}
    .toast{background:rgba(7,7,15,0.93);border:1px solid var(--glass-b);backdrop-filter:blur(10px);
      border-radius:50px;padding:8px 18px;font-size:0.82rem;white-space:nowrap;
      animation:tIn .3s ease,tOut .4s 2.2s forwards}
    .toast.err{border-color:rgba(224,17,95,0.5);color:#ffb3c6}
    .toast.ok{border-color:rgba(80,200,120,0.5);color:#a8f0c6}
    @keyframes tIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes tOut{to{opacity:0;transform:translateY(-6px)}}
    #https-warn{display:none;position:fixed;top:0;left:0;right:0;z-index:9999;padding:10px 16px;text-align:center;
      background:rgba(140,50,10,0.95);backdrop-filter:blur(10px);font-size:0.8rem;color:#ffe8d6;line-height:1.6}
    #https-warn a{color:#ffd700;text-decoration:underline}
  </style>
</head>
<body>
<div id="https-warn"></div>
<div id="app">
  <div id="topbar">
    <div>
      <div class="tb-logo">GEMS AR</div>
      <div class="tb-sub">معرض الأحجار الكريمة</div>
    </div>
    <button id="ar-btn" disabled onclick="enterAR()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span id="ar-btn-txt">جارٍ التحميل…</span>
    </button>
  </div>
  <div id="viewer-wrap">
    <model-viewer id="mv" src="" alt="3D gem model"
      ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto"
      camera-controls auto-rotate auto-rotate-delay="800" rotation-per-second="28deg"
      shadow-intensity="1.4" shadow-softness="0.85" exposure="1.15"
      environment-image="neutral" interaction-prompt="none" style="background:transparent;">
      <button slot="ar-button" style="display:none"></button>
    </model-viewer>
    <div id="mv-loader">
      <div class="ring"></div>
      <div class="loader-txt" id="loader-txt">جارٍ التهيئة…</div>
      <div class="progress-wrap"><div id="progress-bar"></div></div>
    </div>
    <div id="float-label">
      <div class="fl-en" id="fl-en">—</div>
      <div class="fl-ar" id="fl-ar">—</div>
    </div>
    <div id="status-badge"></div>
  </div>
  <div id="info-panel">
    <div id="info-toggle" onclick="toggleInfo()"><div class="chevron"></div></div>
    <div id="info-card">
      <div class="c-header">
        <div class="c-emoji" id="c-emoji">💎</div>
        <div class="c-titles">
          <div class="c-en" id="c-en">—</div>
          <div class="c-ar" id="c-ar">—</div>
        </div>
      </div>
      <p class="c-desc" id="c-desc"></p>
      <div class="c-stats">
        <div class="stat"><div class="s-lbl">صلابة موز</div><div class="s-val" id="s-hard">—</div></div>
        <div class="stat"><div class="s-lbl">الكثافة</div><div class="s-val" id="s-dens">—</div></div>
        <div class="stat"><div class="s-lbl">المنشأ</div><div class="s-val" id="s-orig">—</div></div>
      </div>
    </div>
  </div>
  <div id="gem-menu"><div class="menu-scroll" id="menu-scroll"></div></div>
</div>
<div id="toast-wrap"></div>

const mv=document.getElementById('mv'),mvLoader=document.getElementById('mv-loader'),
      loaderTxt=document.getElementById('loader-txt'),progressBar=document.getElementById('progress-bar'),
      flEN=document.getElementById('fl-en'),flAR=document.getElementById('fl-ar'),
      arBtn=document.getElementById('ar-btn'),arBtnTxt=document.getElementById('ar-btn-txt'),
      statusBadge=document.getElementById('status-badge');

let activeIdx=0, modelLoaded=false;

(function(){
  const isSecure=location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1';
  if(!isSecure){
    const w=document.getElementById('https-warn');
    w.style.display='block';
    w.innerHTML='⚠️ وضع AR يحتاج <strong>HTTPS</strong> — ارفع على <a href="https://pages.github.com" target="_blank">GitHub Pages</a>';
  }
})();

let _st;
function showStatus(msg){statusBadge.textContent=msg;statusBadge.classList.add('show');clearTimeout(_st);_st=setTimeout(()=>statusBadge.classList.remove('show'),5000)}

function buildMenu(){
  const s=document.getElementById('menu-scroll');
  GEMS.forEach((gem,i)=>{
    const c=document.createElement('div');
    c.className='gem-chip'+(i===0?' active':'');
    c.style.setProperty('--chip-color',gem.color);
    c.innerHTML=`<span class="chip-em">${gem.icon}</span><span class="chip-lbl">${gem.nameEN}</span><span class="chip-dot"></span>`;
    c.addEventListener('click',()=>selectGem(i));
    s.appendChild(c);
  });
}

function selectGem(idx){
  if(idx===activeIdx&&modelLoaded)return;
  activeIdx=idx; modelLoaded=false;
  const gem=GEMS[idx];
  document.querySelectorAll('.gem-chip').forEach((c,i)=>{c.classList.toggle('active',i===idx);c.style.setProperty('--chip-color',GEMS[i].color)});
  document.getElementById('menu-scroll').children[idx].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  arBtn.disabled=true; arBtnTxt.textContent='جارٍ التحميل…';
  mvLoader.classList.remove('hidden'); loaderTxt.textContent=gem.nameAR; progressBar.style.width='10%';
  flEN.textContent=gem.nameEN; flEN.style.color=gem.color; flEN.style.textShadow=`0 0 28px ${gem.color}66`; flAR.textContent=gem.nameAR;
  document.getElementById('c-emoji').textContent=gem.icon;
  document.getElementById('c-emoji').style.background=gem.color+'22';
  document.getElementById('c-emoji').style.boxShadow=`0 0 18px ${gem.color}44`;
  document.getElementById('c-en').textContent=gem.nameEN;
  document.getElementById('c-ar').textContent=gem.nameAR;
  document.getElementById('c-desc').textContent=gem.desc;
  document.getElementById('s-hard').textContent=gem.hardness;
  document.getElementById('s-dens').textContent=gem.density;
  document.getElementById('s-orig').textContent=gem.origin;
  document.getElementById('s-hard').style.color=gem.color;
  document.getElementById('info-card').style.borderTopColor=gem.color+'50';
  progressBar.style.width='50%';
  mv.src=GEM_GLB[gem.id];
  toast('✦ '+gem.nameAR);
}

mv.addEventListener('progress',(e)=>{
  const pct=Math.round(e.detail.totalProgress*100);
  progressBar.style.width=Math.max(50,pct)+'%';
});

mv.addEventListener('load',()=>{
  modelLoaded=true;
  mvLoader.classList.add('hidden');
  progressBar.style.width='100%';
  if(mv.canActivateAR){arBtn.disabled=false;arBtnTxt.textContent='وضع AR';showStatus('✓ النموذج جاهز — AR متاح')}
  else{arBtn.disabled=true;arBtnTxt.textContent='AR غير مدعوم';showStatus('⚠️ AR يحتاج HTTPS + موبايل متوافق')}
});

mv.addEventListener('error',(e)=>{
  console.error('mv error:',e);
  mvLoader.classList.add('hidden');
  arBtn.disabled=true; arBtnTxt.textContent='خطأ';
  toast('⚠️ خطأ في تحميل النموذج','err');
  showStatus('✗ خطأ — افتح Console للتفاصيل');
});

mv.addEventListener('ar-status',(e)=>{
  const st=e.detail.status;
  if(st==='session-started')toast('✓ وضع AR نشط','ok');
  if(st==='not-presenting'){toast('← خرجت من AR');arBtn.disabled=false;arBtnTxt.textContent='وضع AR'}
  if(st==='failed'){toast('⚠️ فشل AR','err');arBtn.disabled=false;arBtnTxt.textContent='وضع AR'}
});

function enterAR(){
  if(!modelLoaded){toast('⚠️ انتظر اكتمال التحميل','err');return}
  if(!mv.canActivateAR){
    const isHTTPS=location.protocol==='https:'||location.hostname==='localhost';
    const isMobile=/android|iphone|ipad/i.test(navigator.userAgent);
    if(!isHTTPS)toast('⚠️ يحتاج HTTPS','err');
    else if(!isMobile)toast('⚠️ AR يعمل على الموبايل فقط','err');
    else toast('⚠️ جهازك لا يدعم ARCore/Quick Look','err');
    return;
  }
  mv.activateAR();
}

function toggleInfo(){document.getElementById('info-panel').classList.toggle('collapsed')}

function toast(msg,type=''){
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.textContent=msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>el.remove(),2900);
}

buildMenu();
selectGem(0);
</script>
