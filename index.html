<!DOCTYPE html>
<html>
  <head>
    <title>Gems AR Project - Info Edition</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="diamond-glb" src="diamond.glb"></a-asset-item>
        <a-asset-item id="ruby-glb" src="ruby.glb"></a-asset-item>
        <a-asset-item id="emerald-glb" src="emerald.glb"></a-asset-item>
        <a-asset-item id="topaz-glb" src="topaz.glb"></a-asset-item>
        <a-asset-item id="agate-glb" src="agate.glb"></a-asset-item>
        <a-asset-item id="gold-glb" src="gold.glb"></a-asset-item>
        <a-asset-item id="silver-glb" src="silver.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="diamond.patt">
        <a-entity gltf-model="#diamond-glb" scale="0.5 0.5 0.5" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-entity>
        <a-text value="Diamond\nThe hardest natural substance on Earth." position="0 1.2 0" align="center" color="white" width="3"></a-text>
      </a-marker>

      <a-marker type="pattern" url="ruby.patt">
        <a-entity gltf-model="#ruby-glb" scale="0.5 0.5 0.5" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-entity>
        <a-text value="Ruby\nA red variety of the mineral Corundum." position="0 1.2 0" align="center" color="#FF1493" width="3"></a-text>
      </a-marker>

      <a-marker type="pattern" url="emerald.patt">
        <a-entity gltf-model="#emerald-glb" scale="0.5 0.5 0.5" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-entity>
        <a-text value="Emerald\nFamous for its rich green color and inclusions." position="0 1.2 0" align="center" color="#2ECC71" width="3"></a-text>
      </a-marker>

      <a-marker type="pattern" url="topaz.patt">
        <a-entity gltf-model="#topaz-glb" scale="0.5 0.5 0.5" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-entity>
        <a-text value="Topaz\nA silicate mineral of aluminium and fluorine." position="0 1.2 0" align="center" color="#3498DB" width="3"></a-text>
      </a-marker>

      <a-marker type="pattern" url="agate.patt">
        <a-entity gltf-model="#agate-glb" scale="0.5 0.5 0.5" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-entity>
        <a-text value="Agate\nCharacterized by its unique colorful bands." position="0 1.2 0" align="center" color="#F1C40F" width="3"></a-text>
      </a-marker>

<a-marker type="pattern" url="gold.patt">
  <a-entity gltf-model="#gold-glb" scale="0.1 0.1 0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-entity>
  <a-text value="Gold\nA highly sought-after precious metal." position="0 1.2 0" align="center" color="#FFD700" width="3"></a-text>
</a-marker>

<a-marker type="pattern" url="silver.patt">

  <a-entity gltf-model="#silver-glb" scale="2 2 2" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-entity>
  <a-text value="Silver\nKnown for its high electrical conductivity." position="0 1.2 0" align="center" color="#C0C0C0" width="3"></a-text>
</a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
