<!DOCTYPE html>
<html>
  <head>
    <title>Gems AR Project - Info Edition</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
 
      /* ───── زر "اعرف أكثر" العائم ───── */
      #info-btn {
        display: none;                      /* مخفي بالأساس */
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
 
        padding: 14px 36px;
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        background: rgba(30, 30, 30, 0.85);
        border: 2px solid rgba(255,255,255,0.35);
        border-radius: 50px;
        cursor: pointer;
 
        /* منع أي تدخل من A-Frame */
        pointer-events: auto;
 
        /* انتقال ناعم */
        transition: opacity 0.3s, transform 0.3s;
        opacity: 0;
      }
 
      #info-btn.visible {
        display: block;
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        animation: pulse 2s infinite;
      }
 
      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
        50%       { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
      }
 
      /* ───── تسمية اسم الحجر ───── */
      #gem-label {
        display: none;
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        padding: 8px 24px;
        font-size: 15px;
        color: #fff;
        background: rgba(0,0,0,0.55);
        border-radius: 20px;
        letter-spacing: 0.5px;
        pointer-events: none;
      }
      #gem-label.visible { display: block; }
    </style>
  </head>
 
  <body style="margin:0; overflow:hidden;">
 
    <!-- ── عناصر UI خارج A-Frame تماماً ── -->
    <div id="gem-label"></div>
 
    <button id="info-btn" onclick="openGemUrl()">
      🔍 اعرف أكثر
    </button>
 
    <!-- ── مشهد AR ── -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
 
      <a-assets>
        <a-asset-item id="diamond-glb" src="diamond.glb"></a-asset-item>
        <a-asset-item id="ruby-glb"    src="ruby.glb"></a-asset-item>
        <a-asset-item id="emerald-glb" src="emerald.glb"></a-asset-item>
        <a-asset-item id="topaz-glb"   src="topaz.glb"></a-asset-item>
        <a-asset-item id="agate-glb"   src="agate.glb"></a-asset-item>
        <a-asset-item id="gold-glb"    src="gold.glb"></a-asset-item>
        <a-asset-item id="silver-glb"  src="silver.glb"></a-asset-item>
      </a-assets>
 
      <a-marker type="pattern" url="diamond.patt"
                data-url="https://en.wikipedia.org/wiki/Diamond"
                data-name=" Diamond">
        <a-entity gltf-model="#diamond-glb" scale="0.5 0.5 0.5"
                  animation="property:rotation; to:0 360 0; loop:true; dur:4000"></a-entity>
        <a-text value="Diamond&#10;The hardest natural substance on Earth."
                position="0 1.2 0" align="center" color="white" width="3"></a-text>
      </a-marker>
 
      <a-marker type="pattern" url="ruby.patt"
                data-url="https://en.wikipedia.org/wiki/Ruby"
                data-name=" Ruby">
        <a-entity gltf-model="#ruby-glb" scale="0.5 0.5 0.5"
                  animation="property:rotation; to:0 360 0; loop:true; dur:4000"></a-entity>
        <a-text value="Ruby&#10;A red variety of the mineral Corundum."
                position="0 1.2 0" align="center" color="#FF1493" width="3"></a-text>
      </a-marker>
 
      <a-marker type="pattern" url="emerald.patt"
                data-url="https://en.wikipedia.org/wiki/Emerald"
                data-name=" Emerald">
        <a-entity gltf-model="#emerald-glb" scale="0.5 0.5 0.5"
                  animation="property:rotation; to:0 360 0; loop:true; dur:4000"></a-entity>
        <a-text value="Emerald&#10;Famous for its rich green color and inclusions."
                position="0 1.2 0" align="center" color="#2ECC71" width="3"></a-text>
      </a-marker>
 
      <a-marker type="pattern" url="topaz.patt"
                data-url="https://en.wikipedia.org/wiki/Topaz"
                data-name=" Topaz">
        <a-entity gltf-model="#topaz-glb" scale="0.5 0.5 0.5"
                  animation="property:rotation; to:0 360 0; loop:true; dur:4000"></a-entity>
        <a-text value="Topaz&#10;A silicate mineral of aluminium and fluorine."
                position="0 1.2 0" align="center" color="#3498DB" width="3"></a-text>
      </a-marker>
 
      <a-marker type="pattern" url="agate.patt"
                data-url="https://en.wikipedia.org/wiki/Agate"
                data-name="Agate">
        <a-entity gltf-model="#agate-glb" scale="0.1 0.1 0.1"
                  animation="property:rotation; to:0 360 0; loop:true; dur:4000"></a-entity>
        <a-text value="Agate&#10;Characterized by its unique colorful bands."
                position="0 1.2 0" align="center" color="#F1C40F" width="3"></a-text>
      </a-marker>
 
      <a-marker type="pattern" url="gold.patt"
                data-url="https://en.wikipedia.org/wiki/Gold"
                data-name=" Gold">
        <a-entity gltf-model="#gold-glb" scale="0.05 0.05 0.05"
                  animation="property:rotation; to:0 360 0; loop:true; dur:4000"></a-entity>
        <a-text id="gold-text" value="Gold&#10;Loading current price..."
                position="0 1.2 0" align="center" color="#FFD700" width="3"></a-text>
      </a-marker>
 
      <a-marker type="pattern" url="silver.patt"
                data-url="https://en.wikipedia.org/wiki/Silver"
                data-name=" Silver">
        <a-entity gltf-model="#silver-glb" scale="1 1 1"
                  animation="property:rotation; to:0 360 0; loop:true; dur:4000"></a-entity>
        <a-text value="Silver&#10;Known for its high electrical conductivity."
                position="0 1.2 0" align="center" color="white" width="3"></a-text>
      </a-marker>
 
      <a-entity camera></a-entity>
    </a-scene>
 
    <script>
      // ─── الحالة الحالية ───
      let currentUrl  = "";
      let currentName = "";
 
      const btn      = document.getElementById('info-btn');
      const gemLabel = document.getElementById('gem-label');
 
      // ─── دالة الفتح — مرتبطة مباشرة بـ onclick ───
      function openGemUrl() {
        if (currentUrl) window.open(currentUrl, '_blank');
      }
 
      // ─── إظهار / إخفاء الزر والتسمية ───
      function showUI(url, name) {
        currentUrl  = url;
        currentName = name;
        gemLabel.textContent = name;
        gemLabel.classList.add('visible');
        btn.classList.add('visible');
        btn.style.display = 'block';
      }
 
      function hideUI() {
        currentUrl  = "";
        currentName = "";
        gemLabel.classList.remove('visible');
        btn.classList.remove('visible');
        // إخفاء بعد انتهاء الانتقال
        setTimeout(() => { btn.style.display = 'none'; }, 300);
      }
 
      // ─── ربط أحداث العلامات ───
      window.addEventListener('load', function () {
 
        document.querySelectorAll('a-marker').forEach(function (marker) {
          marker.addEventListener('markerFound', function () {
            showUI(
              marker.getAttribute('data-url'),
              marker.getAttribute('data-name') || 'Gem'
            );
          });
          marker.addEventListener('markerLost', hideUI);
        });
 
        // ─── جلب سعر الذهب ───
        fetch("https://www.goldapi.io/api/XAU/USD", {
          method: 'GET',
          headers: {
            "x-access-token": "goldapi-bbe569760bec77a34f75203117c1f24c-io",
            "Content-Type": "application/json"
          }
        })
        .then(r => r.json())
        .then(result => {
          const el = document.querySelector('#gold-text');
          if (el && result.price) {
            el.setAttribute('value',
              'Gold\nGlobal Price: $' + Number(result.price).toLocaleString() + ' / oz');
          }
        })
        .catch(() => {
          const el = document.querySelector('#gold-text');
          if (el) el.setAttribute('value', 'Gold\nPrice unavailable');
        });
 
      });
    </script>
  </body>
</html>
