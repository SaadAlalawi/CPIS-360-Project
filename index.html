<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">

  <!-- A-Frame & AR.js -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    /* الأساسيات */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: #0a0a12;
      color: #fff;
      overflow: hidden;
      overscroll-behavior: contain;
      position: fixed;
      width: 100%;
      height: 100%;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* حاوية مشهد AR */
    #ar-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1;
      display: none; /* مخفي حتى الضغط على ابدأ */
    }
    #ar-container.active { display: block; }

    /* شاشة البداية */
    #splash {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a12 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.8s, transform 0.8s;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.05);
    }

    /* جسيمات الخلفية */
    #particles-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .splash-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 20px;
    }

    .logo-icon {
      font-size: 4rem;
      animation: float 3s ease-in-out infinite;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 20px #ffd700);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      color: #ffd700;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .subtitle {
      font-family: 'Tajawal', sans-serif;
      color: #ccc;
      margin-bottom: 30px;
      font-size: 1rem;
    }

    /* دليل الاستخدام */
    .guide-steps {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }
    .step {
      width: 80px;
      text-align: center;
    }
    .step-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      animation: pulse 2s infinite;
      display: block;
    }
    .step:nth-child(2) .step-icon { animation-delay: 0.3s; }
    .step:nth-child(3) .step-icon { animation-delay: 0.6s; }
    @keyframes pulse {
      0%{transform: scale(1);} 50%{transform: scale(1.15);} 100%{transform: scale(1);}
    }
    .step-text {
      font-size: 0.75rem;
      color: #aaa;
    }

    /* زر البدء */
    .start-btn {
      background: linear-gradient(135deg, #ffd700, #b8860b);
      border: none;
      color: #0a0a12;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1.3rem;
      padding: 16px 40px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(255,215,0,0.4);
      transition: all 0.3s;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
    }
    .start-btn:active { transform: scale(0.95); }

    /* مؤشر التحميل الداخلي */
    .loader-diamond {
      width: 50px; height: 50px;
      margin: 20px auto 0;
      border: 3px solid #ffd700;
      transform: rotate(45deg);
      animation: spin 1.5s linear infinite;
      display: none;
    }
    .loader-diamond.active { display: block; }
    @keyframes spin {
      0% { transform: rotate(45deg); }
      100% { transform: rotate(405deg); }
    }

    /* HUD العلوي */
    #hud {
      position: fixed;
      top: 0; left: 0; width: 100%;
      z-index: 20;
      pointer-events: none;
      display: none;
      padding: 15px 20px;
      justify-content: space-between;
      align-items: center;
    }
    #hud.active { display: flex; }
    #hud > * { pointer-events: auto; }
    .hud-btn {
      background: rgba(20,20,30,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 50px;
      color: #fff;
      font-size: 1.2rem;
      width: 40px; height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .camera-status {
      background: rgba(20,20,30,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 8px 15px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #666;
    }
    .status-dot.active {
      background: #50C878;
      box-shadow: 0 0 10px #50C878;
    }
    .gem-indicator {
      background: rgba(20,20,30,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 8px 15px;
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      display: none;
    }
    .gem-indicator.active { display: block; }

    /* بطاقة المعلومات السفلية */
    #info-card {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(20, 20, 30, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px 24px 0 0;
      border-top: 1px solid rgba(255, 215, 0, 0.3);
      color: #fff;
      padding: 20px;
      z-index: 30;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-height: 60vh;
      overflow-y: auto;
    }
    #info-card.visible { transform: translateY(0); }
    .card-handle {
      width: 40px; height: 4px;
      background: #ffd700;
      opacity: 0.6;
      border-radius: 2px;
      align-self: center;
      margin-bottom: 5px;
    }
    .gem-header {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .gem-icon {
      width: 50px; height: 50px;
      background: rgba(255,215,0,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .gem-names {
      flex: 1;
    }
    .gem-name-ar {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      direction: rtl;
    }
    .gem-name-en {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: #ffd700;
      letter-spacing: 2px;
    }
    .stats-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .stat-item {
      flex: 1;
      min-width: 70px;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }
    .stat-label { font-size: 0.65rem; color: #aaa; margin-bottom: 4px; }
    .stat-value { font-weight: 700; font-size: 1.1rem; }
    .price-box {
      background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 16px;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .price-label { font-family: 'Tajawal', sans-serif; }
    .price-value { font-family: 'Cinzel', serif; font-size: 1.3rem; color: #ffd700; }
    .card-buttons {
      display: flex;
      gap: 10px;
    }
    .card-btn {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 12px;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
    }
    .card-btn:active { background: rgba(255,215,0,0.3); }

    /* الإشعارات */
    #toast-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .toast {
      background: rgba(20,20,30,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideDown 0.3s ease, fadeOut 0.5s 2s forwards;
      white-space: nowrap;
      color: #fff;
    }
    .toast.error { border-color: #e0115f; }
    @keyframes slideDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(-20px); }
    }
  </style>
</head>
<body>
  <!-- شاشة البداية -->
  <div id="splash">
    <canvas id="particles-canvas"></canvas>
    <div class="splash-content">
      <div class="logo-icon">💎</div>
      <h1>GEMSTONES AR</h1>
      <p class="subtitle">اكتشف جمال الأحجار الكريمة في الواقع المعزز</p>
      <div class="guide-steps">
        <div class="step">
          <span class="step-icon">📷</span>
          <div class="step-text">وجّه الكاميرا</div>
        </div>
        <div class="step">
          <span class="step-icon">🖐️</span>
          <div class="step-text">أظهر العلامة</div>
        </div>
        <div class="step">
          <span class="step-icon">💎</span>
          <div class="step-text">تمتع بالجوهرة</div>
        </div>
      </div>
      <button class="start-btn" id="start-btn">ابدأ التجربة</button>
      <div class="loader-diamond" id="loader"></div>
    </div>
  </div>

  <!-- واجهة HUD -->
  <div id="hud">
    <div class="hud-btn" id="back-btn" title="خروج">✕</div>
    <div class="camera-status">
      <span class="status-dot" id="camera-dot"></span>
      <span>الكاميرا</span>
    </div>
    <div class="gem-indicator" id="gem-indicator"></div>
  </div>

  <!-- بطاقة المعلومات -->
  <div id="info-card">
    <div class="card-handle"></div>
    <div class="gem-header">
      <div class="gem-icon" id="gem-icon-display">💎</div>
      <div class="gem-names">
        <div class="gem-name-ar" id="gem-name-ar"></div>
        <div class="gem-name-en" id="gem-name-en"></div>
      </div>
    </div>
    <p id="gem-desc" style="font-size:0.9rem; color:#ddd; line-height:1.5;"></p>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-label">صلابة موز</div>
        <div class="stat-value" id="stat-hardness"></div>
      </div>
      <div class="stat-item">
        <div class="stat-label">كثافة</div>
        <div class="stat-value" id="stat-density"></div>
      </div>
      <div class="stat-item">
        <div class="stat-label">المنشأ</div>
        <div class="stat-value" id="stat-origin"></div>
      </div>
    </div>
    <div class="price-box" id="price-section">
      <span class="price-label">السعر اليوم</span>
      <span class="price-value" id="price-value">--</span>
    </div>
    <div class="card-buttons">
      <button class="card-btn" id="more-btn">📖 اعرف أكثر</button>
      <button class="card-btn" id="share-btn">🔗 مشاركة</button>
    </div>
  </div>

  <!-- حاوية الإشعارات -->
  <div id="toast-container"></div>

  <!-- حاوية مشهد AR (يضاف ديناميكياً) -->
  <div id="ar-container"></div>

  <script>
    (function() {
      // ================== بيانات الأحجار ==================
      const gems = [
        {
          id: 'diamond',
          nameAR: 'ألماس',
          nameEN: 'Diamond',
          desc: 'أصلب مادة طبيعية على الأرض، يرمز للنقاء والقوة.',
          hardness: 10,
          density: 3.5,
          origin: 'روسيا',
          patt: 'markers/diamond.patt',
          glb: 'models/diamond.glb',
          scale: '0.5 0.5 0.5',
          color: '#B9F2FF',
          icon: '💎'
        },
        {
          id: 'ruby',
          nameAR: 'ياقوت',
          nameEN: 'Ruby',
          desc: 'حجر كريم أحمر اللون يمثل العاطفة والشجاعة.',
          hardness: 9,
          density: 4.0,
          origin: 'ميانمار',
          patt: 'markers/ruby.patt',
          glb: 'models/ruby.glb',
          scale: '0.6 0.6 0.6',
          color: '#E0115F',
          icon: '🔴'
        },
        {
          id: 'emerald',
          nameAR: 'زمرد',
          nameEN: 'Emerald',
          desc: 'جوهرة خضراء نادرة ترمز للأمل والنمو.',
          hardness: 7.5,
          density: 2.7,
          origin: 'كولومبيا',
          patt: 'markers/emerald.patt',
          glb: 'models/emerald.glb',
          scale: '0.5 0.5 0.5',
          color: '#50C878',
          icon: '🟢'
        },
        {
          id: 'topaz',
          nameAR: 'توباز',
          nameEN: 'Topaz',
          desc: 'حجر شفاف يتوفر بألوان متعددة، يرمز للصفاء.',
          hardness: 8,
          density: 3.5,
          origin: 'البرازيل',
          patt: 'markers/topaz.patt',
          glb: 'models/topaz.glb',
          scale: '0.45 0.45 0.45',
          color: '#FFC87C',
          icon: '🟠'
        },
        {
          id: 'agate',
          nameAR: 'عقيق',
          nameEN: 'Agate',
          desc: 'أحجار كريمة ذات طبقات مذهلة، تعزز الاستقرار.',
          hardness: 7,
          density: 2.6,
          origin: 'اليمن',
          patt: 'markers/agate.patt',
          glb: 'models/agate.glb',
          scale: '0.6 0.6 0.6',
          color: '#D3A57C',
          icon: '🟤'
        },
        {
          id: 'gold',
          nameAR: 'ذهب',
          nameEN: 'Gold',
          desc: 'معدن ثمين خالد، رمز الثراء والفخامة.',
          hardness: 2.5,
          density: 19.3,
          origin: 'جنوب أفريقيا',
          patt: 'markers/gold.patt',
          glb: 'models/gold.glb',
          scale: '0.7 0.7 0.7',
          color: '#FFD700',
          icon: '🟡',
          livePrice: true
        },
        {
          id: 'silver',
          nameAR: 'فضة',
          nameEN: 'Silver',
          desc: 'معدن لامع يستخدم في المجوهرات والعملات.',
          hardness: 2.7,
          density: 10.5,
          origin: 'المكسيك',
          patt: 'markers/silver.patt',
          glb: 'models/silver.glb',
          scale: '0.65 0.65 0.65',
          color: '#C0C0C0',
          icon: '⚪',
          livePrice: true
        }
      ];

      // أسعار المعادن الحية
      let goldPricePerGram = null;
      let silverPricePerGram = null;

      // الحالة
      let currentGem = null;
      let sceneLoaded = false;
      let arScene = null;

      // ================== جلب الأسعار ==================
      async function fetchMetalPrices() {
        const API_KEY = 'YOUR_GOLDAPI_KEY'; // استبدل بمفتاحك
        try {
          const goldRes = await fetch('https://www.goldapi.io/api/XAU/SAR', {
            headers: { 'x-access-token': API_KEY }
          });
          const goldData = await goldRes.json();
          if (goldData.price_gram_24k) {
            goldPricePerGram = goldData.price_gram_24k;
          } else if (goldData.price) {
            goldPricePerGram = goldData.price / 31.1035;
          }
        } catch (e) { console.warn('تعذر جلب سعر الذهب'); }
        try {
          const silverRes = await fetch('https://www.goldapi.io/api/XAG/SAR', {
            headers: { 'x-access-token': API_KEY }
          });
          const silverData = await silverRes.json();
          if (silverData.price_gram_24k) {
            silverPricePerGram = silverData.price_gram_24k;
          } else if (silverData.price) {
            silverPricePerGram = silverData.price / 31.1035;
          }
        } catch (e) { console.warn('تعذر جلب سعر الفضة'); }
      }

      // ================== الإشعارات ==================
      function showToast(msg, isError = false) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.innerHTML = `${isError ? '⚠️' : '✨'} ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
      }

      // ================== بطاقة المعلومات ==================
      function updateInfoCard(gem) {
        if (!gem) return;
        document.getElementById('gem-icon-display').textContent = gem.icon;
        document.getElementById('gem-name-ar').textContent = gem.nameAR;
        document.getElementById('gem-name-en').textContent = gem.nameEN;
        document.getElementById('gem-desc').textContent = gem.desc;
        document.getElementById('stat-hardness').textContent = gem.hardness;
        document.getElementById('stat-density').textContent = `${gem.density} g/cm³`;
        document.getElementById('stat-origin').textContent = gem.origin;

        let priceText = '--';
        if (gem.id === 'gold' && goldPricePerGram) {
          priceText = `${goldPricePerGram.toFixed(2)} ريال/غرام`;
        } else if (gem.id === 'silver' && silverPricePerGram) {
          priceText = `${silverPricePerGram.toFixed(2)} ريال/غرام`;
        } else if (!gem.livePrice) {
          priceText = 'غير متاح';
        }
        document.getElementById('price-value').textContent = priceText;

        // تغيير لون البطاقة حسب الجوهرة
        const card = document.getElementById('info-card');
        card.style.borderTopColor = gem.color;
        card.style.boxShadow = `0 -10px 30px ${gem.color}20`;
      }

      function showInfoCard(gem) {
        currentGem = gem;
        updateInfoCard(gem);
        document.getElementById('info-card').classList.add('visible');
        document.getElementById('gem-indicator').textContent = gem.nameEN;
        document.getElementById('gem-indicator').classList.add('active');
        document.getElementById('camera-dot').classList.add('active');
        if (navigator.vibrate) navigator.vibrate(15);
        showToast(`تم اكتشاف ${gem.nameAR}`);
      }

      function hideInfoCard() {
        document.getElementById('info-card').classList.remove('visible');
        document.getElementById('gem-indicator').classList.remove('active');
        document.getElementById('camera-dot').classList.remove('active');
        currentGem = null;
      }

      // ================== زر اعرف أكثر و مشاركة ==================
      document.getElementById('more-btn').addEventListener('click', () => {
        if (!currentGem) return;
        const query = encodeURIComponent(currentGem.nameEN + ' gemstone');
        window.open(`https://ar.wikipedia.org/wiki/${query}`, '_blank');
      });

      document.getElementById('share-btn').addEventListener('click', async () => {
        if (!currentGem) return;
        const shareData = {
          title: `اكتشف ${currentGem.nameAR} في الواقع المعزز`,
          text: `شاهد ${currentGem.nameAR} بتجربة Web AR مذهلة!`,
          url: window.location.href
        };
        try {
          if (navigator.share) {
            await navigator.share(shareData);
          } else {
            await navigator.clipboard.writeText(window.location.href);
            showToast('تم نسخ الرابط');
          }
        } catch (e) {
          showToast('لم نتمكن من المشاركة', true);
        }
      });

      // ================== شاشة البداية والجسيمات ==================
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function createParticles() {
        particles = [];
        for (let i = 0; i < 40; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.5,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            color: `rgba(255,215,0,${Math.random() * 0.5 + 0.1})`
          });
        }
      }
      createParticles();

      function animateParticles() {
        if (document.getElementById('splash').classList.contains('hidden')) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
          ctx.fillStyle = p.color;
          ctx.fill();
        });
        requestAnimationFrame(animateParticles);
      }
      animateParticles();

      // ================== بناء مشهد AR ==================
      function createARScene() {
        const container = document.getElementById('ar-container');
        // تنظيف سابق
        container.innerHTML = '';
        arScene = document.createElement('a-scene');
        arScene.setAttribute('embedded', '');
        arScene.setAttribute('vr-mode-ui', 'enabled: false');
        arScene.setAttribute('renderer', 'antialias: false; precision: mediump; colorManagement: true;');
        arScene.setAttribute('arjs', 'sourceType: webcam; trackingMethod: best; debugUIEnabled: false;');

        // ضوء محيط
        const light = document.createElement('a-entity');
        light.setAttribute('light', 'type: ambient; intensity: 1.2;');
        arScene.appendChild(light);

        // لكل جوهرة نضيف marker
        gems.forEach(gem => {
          const marker = document.createElement('a-marker');
          marker.setAttribute('type', 'pattern');
          marker.setAttribute('url', gem.patt);
          marker.setAttribute('data-gem-id', gem.id);
          marker.setAttribute('id', `marker-${gem.id}`);

          // حلقة حول العلامة
          const ring = document.createElement('a-ring');
          ring.setAttribute('radius-inner', '0.4');
          ring.setAttribute('radius-outer', '0.45');
          ring.setAttribute('color', gem.color);
          ring.setAttribute('opacity', '0.3');
          ring.setAttribute('id', `ring-${gem.id}`);
          ring.setAttribute('visible', 'false');
          marker.appendChild(ring);

          // المجسم
          const model = document.createElement('a-entity');
          model.setAttribute('gltf-model', gem.glb);
          model.setAttribute('scale', gem.scale);
          model.setAttribute('position', '0 0.1 0');
          model.setAttribute('animation', 'property: rotation; to: 0 360 0; dur: 10000; loop: true; easing: linear;');
          marker.appendChild(model);

          // نص ترحيب فوق المجسم
          const welcomeText = document.createElement('a-text');
          welcomeText.setAttribute('value', `مرحباً بك في ${gem.nameAR}`);
          welcomeText.setAttribute('align', 'center');
          welcomeText.setAttribute('position', '0 0.8 0');
          welcomeText.setAttribute('color', gem.color);
          welcomeText.setAttribute('scale', '1.2 1.2 1.2');
          welcomeText.setAttribute('opacity', '0');
          welcomeText.setAttribute('id', `welcome-${gem.id}`);
          marker.appendChild(welcomeText);

          arScene.appendChild(marker);
        });

        container.appendChild(arScene);
      }

      // إعداد أحداث العلامات
      function setupMarkerEvents() {
        if (!arScene) return;
        arScene.addEventListener('markerFound', (ev) => {
          const marker = ev.target;
          const gemId = marker.getAttribute('data-gem-id');
          const gem = gems.find(g => g.id === gemId);
          if (!gem) return;

          // إظهار الحلقة بنبضة
          const ring = marker.querySelector(`#ring-${gemId}`);
          if (ring) {
            ring.setAttribute('visible', true);
            ring.setAttribute('scale', '0.1 0.1 0.1');
            ring.setAttribute('animation__pulse', 'property: scale; from: 0.1 0.1 0.1; to: 1 1 1; dur: 500; easing: easeOutElastic;');
          }
          // نص الترحيب
          const welcome = marker.querySelector(`#welcome-${gemId}`);
          if (welcome) {
            welcome.setAttribute('opacity', '1');
            welcome.setAttribute('animation__fade', 'property: opacity; from: 1; to: 0; dur: 2000; delay: 500;');
          }
          showInfoCard(gem);
        });

        arScene.addEventListener('markerLost', (ev) => {
          const marker = ev.target;
          const gemId = marker.getAttribute('data-gem-id');
          const ring = marker.querySelector(`#ring-${gemId}`);
          if (ring) {
            ring.setAttribute('visible', false);
            ring.removeAttribute('animation__pulse');
          }
          hideInfoCard();
        });

        // عند تحميل المشهد
        arScene.addEventListener('loaded', () => {
          sceneLoaded = true;
          document.getElementById('loader').classList.remove('active');
          // إظهار HUD
          document.getElementById('hud').classList.add('active');
          showToast('التجربة جاهزة، وجّه الكاميرا نحو العلامة');
          // إخفاء شاشة البداية بتأثير
          document.getElementById('splash').classList.add('hidden');
        });
      }

      // ================== بدء التجربة ==================
      document.getElementById('start-btn').addEventListener('click', async () => {
        // طلب الكاميرا أولاً (اختياري لكنه يحسّن التجربة)
        try {
          await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        } catch (e) {
          showToast('يجب السماح بالكاميرا لاستخدام الواقع المعزز', true);
          return;
        }

        // أظهر المؤشر
        document.getElementById('loader').classList.add('active');
        // أنشئ المشهد
        createARScene();
        setupMarkerEvents();

        // طلب وضع ملء الشاشة إن أمكن
        const container = document.getElementById('ar-container');
        container.classList.add('active');
        if (container.requestFullscreen) {
          container.requestFullscreen().catch(() => {});
        } else if (container.webkitRequestFullscreen) {
          container.webkitRequestFullscreen();
        }
      });

      // ================== زر الخروج ==================
      document.getElementById('back-btn').addEventListener('click', () => {
        hideInfoCard();
        if (arScene) {
          arScene.remove();
          arScene = null;
          sceneLoaded = false;
        }
        document.getElementById('ar-container').classList.remove('active');
        document.getElementById('hud').classList.remove('active');
        document.getElementById('splash').classList.remove('hidden');
        document.getElementById('loader').classList.remove('active');
        if (document.fullscreenElement) {
          document.exitFullscreen();
        }
      });

      // ================== جلب الأسعار عند التحميل ==================
      fetchMetalPrices();
    })();
  </script>
</body>
</html>
