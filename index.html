<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gemstones AR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    :root {
      --gold:#D4AF37;--gold-lt:#F5D76E;--gold-dim:rgba(212,175,55,0.14);
      --glass:rgba(8,8,18,0.88);--glass-b:rgba(212,175,55,0.22);
      --text:#f0ece0;--muted:rgba(240,236,224,0.46);
      --ease:0.38s cubic-bezier(0.22,1,0.36,1);
      --fn-en:'Cinzel',serif;--fn-ar:'Tajawal',sans-serif;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#07070f;color:var(--text);
      font-family:var(--fn-ar);-webkit-tap-highlight-color:transparent;user-select:none}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(212,175,55,0.06) 0%,transparent 60%),
                 radial-gradient(ellipse 60% 60% at 80% 80%,rgba(80,50,180,0.06) 0%,transparent 60%)}
    #app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column}

    /* TOPBAR */
    #topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
      padding:14px 18px 10px;background:linear-gradient(to bottom,rgba(7,7,15,0.97),transparent);z-index:10}
    .tb-logo{font-family:var(--fn-en);font-size:1.05rem;letter-spacing:4px;color:var(--gold);
      animation:logoGlow 4s ease-in-out infinite}
    @keyframes logoGlow{0%,100%{text-shadow:0 0 10px rgba(212,175,55,0.25)}50%{text-shadow:0 0 28px rgba(212,175,55,0.7)}}
    .tb-sub{font-size:0.68rem;color:var(--muted);letter-spacing:1px;margin-top:2px}
    .tb-actions{display:flex;gap:8px;align-items:center}

    /* BUTTONS */
    .btn{display:flex;align-items:center;gap:6px;padding:8px 14px;
      background:var(--gold-dim);border:1px solid var(--glass-b);border-radius:50px;
      font-family:var(--fn-ar);font-size:0.80rem;color:var(--gold-lt);cursor:pointer;
      transition:background var(--ease),box-shadow var(--ease),opacity var(--ease),transform .15s}
    .btn:hover:not(:disabled){background:rgba(212,175,55,0.28);box-shadow:0 0 20px rgba(212,175,55,0.18)}
    .btn:active:not(:disabled){transform:scale(0.95)}
    .btn:disabled{opacity:0.35;cursor:not-allowed;border-color:rgba(255,255,255,0.08);color:var(--muted)}
    .btn svg{width:14px;height:14px;flex-shrink:0}
    .btn-multi{background:rgba(80,50,180,0.18);border-color:rgba(120,80,255,0.35);color:#c4b0ff}
    .btn-multi:hover:not(:disabled){background:rgba(100,60,220,0.30)}
    .btn-multi.active{background:rgba(100,60,220,0.40);border-color:rgba(150,100,255,0.6);color:#e0d0ff;
      box-shadow:0 0 16px rgba(120,80,255,0.28)}

    /* VIEWER */
    #viewer-wrap{flex:1;position:relative;overflow:hidden}
    model-viewer{width:100%;height:100%;background-color:transparent;--poster-color:transparent}
    model-viewer::part(default-ar-button){display:none}
    model-viewer::part(default-progress-bar){display:none}

    /* LOADER */
    #mv-loader{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:14px;
      background:rgba(7,7,15,0.65);backdrop-filter:blur(8px);transition:opacity .4s,visibility .4s}
    #mv-loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
    .ring{width:48px;height:48px;border:3px solid rgba(212,175,55,0.1);
      border-top-color:var(--gold);border-radius:50%;animation:spin 0.9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader-txt{font-size:0.78rem;color:var(--muted);letter-spacing:1px}
    .progress-wrap{width:140px;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
    #progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--gold-lt));
      border-radius:2px;transition:width .25s ease}

    /* FLOAT LABEL */
    #float-label{position:absolute;top:14px;left:50%;transform:translateX(-50%);
      z-index:6;text-align:center;pointer-events:none}
    .fl-en{font-family:var(--fn-en);font-size:clamp(1.3rem,4.5vw,1.9rem);
      letter-spacing:4px;color:var(--gold);text-shadow:0 0 28px rgba(212,175,55,0.45);
      transition:color .4s,text-shadow .4s}
    .fl-ar{font-size:0.78rem;color:var(--muted);letter-spacing:1px;margin-top:2px}

    /* INTERACTION HINT */
    #hint{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
      z-index:6;font-size:0.68rem;color:var(--muted);
      background:rgba(7,7,15,0.60);padding:4px 12px;border-radius:20px;
      border:1px solid rgba(255,255,255,0.06);pointer-events:none;
      animation:hintFade 3s ease 1.5s forwards;opacity:0}
    @keyframes hintFade{0%{opacity:0}20%{opacity:1}80%{opacity:1}100%{opacity:0}}

    /* MULTI-AR PANEL */
    #multi-panel{position:absolute;inset:0;z-index:8;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
      background:rgba(7,7,15,0.92);backdrop-filter:blur(16px);
      opacity:0;visibility:hidden;transition:opacity .4s,visibility .4s}
    #multi-panel.show{opacity:1;visibility:visible}
    .mp-title{font-family:var(--fn-en);font-size:1.1rem;letter-spacing:3px;color:var(--gold);
      text-shadow:0 0 20px rgba(212,175,55,0.4);margin-bottom:4px}
    .mp-sub{font-size:0.76rem;color:var(--muted);margin-bottom:8px}
    .mp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 20px;width:100%;max-width:380px}
    .mp-chip{display:flex;flex-direction:column;align-items:center;gap:5px;
      padding:10px 6px;border-radius:12px;border:1px solid rgba(255,255,255,0.07);
      background:rgba(255,255,255,0.04);cursor:pointer;position:relative;
      transition:all var(--ease)}
    .mp-chip.selected{border-color:var(--glass-b);background:var(--gold-dim);
      box-shadow:0 0 14px rgba(212,175,55,0.15)}
    .mp-chip.selected::after{content:'✓';position:absolute;top:3px;right:5px;
      font-size:0.55rem;color:var(--gold)}
    .mp-em{font-size:1.4rem}
    .mp-lbl{font-size:0.56rem;color:var(--muted);font-family:var(--fn-en);letter-spacing:0.5px}
    .mp-chip.selected .mp-lbl{color:var(--gold-lt)}
    .mp-actions{display:flex;gap:10px;margin-top:4px}
    .mp-count{font-size:0.72rem;color:var(--muted);margin-top:2px}
    .mp-note{font-size:0.66rem;color:rgba(196,176,255,0.6);text-align:center;padding:0 24px;line-height:1.5}

    /* STATUS */
    #status-badge{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
      z-index:7;font-size:0.7rem;color:var(--muted);background:rgba(7,7,15,0.75);
      padding:5px 14px;border-radius:50px;border:1px solid rgba(255,255,255,0.07);
      pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .4s}
    #status-badge.show{opacity:1}

    /* INFO PANEL */
    #info-panel{flex-shrink:0;position:relative;z-index:10}
    #info-toggle{position:absolute;top:-34px;left:50%;transform:translateX(-50%);
      width:72px;height:26px;background:var(--glass);border:1px solid var(--glass-b);
      border-bottom:none;border-radius:12px 12px 0 0;display:flex;align-items:center;
      justify-content:center;cursor:pointer;backdrop-filter:blur(14px)}
    .chevron{width:22px;height:3px;background:rgba(212,175,55,0.4);border-radius:2px;position:relative}
    .chevron::before,.chevron::after{content:'';position:absolute;width:12px;height:3px;
      background:rgba(212,175,55,0.4);border-radius:2px;top:-5px}
    .chevron::before{left:1px;transform:rotate(40deg);transform-origin:right}
    .chevron::after{right:1px;transform:rotate(-40deg);transform-origin:left}
    #info-panel.collapsed .chevron::before{top:5px;transform:rotate(-40deg);transform-origin:right}
    #info-panel.collapsed .chevron::after{top:5px;transform:rotate(40deg);transform-origin:left}
    #info-card{background:var(--glass);backdrop-filter:blur(24px) saturate(160%);
      -webkit-backdrop-filter:blur(24px) saturate(160%);border-top:1px solid var(--glass-b);
      padding:14px 18px 18px;display:flex;flex-direction:column;gap:12px;
      max-height:38vh;overflow-y:auto;transition:max-height var(--ease),padding var(--ease)}
    #info-panel.collapsed #info-card{max-height:0;padding-top:0;padding-bottom:0;overflow:hidden}
    .c-header{display:flex;align-items:center;gap:12px}
    .c-emoji{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;
      justify-content:center;font-size:1.7rem;flex-shrink:0;transition:background .3s,box-shadow .3s}
    .c-titles{flex:1;min-width:0}
    .c-en{font-family:var(--fn-en);font-size:1.1rem;color:var(--gold);letter-spacing:2px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .c-ar{font-size:0.82rem;color:var(--muted);margin-top:2px}
    .c-desc{font-size:0.83rem;color:rgba(240,236,224,0.72);line-height:1.78;
      border-right:2px solid var(--glass-b);padding-right:10px}
    .c-stats{display:flex;gap:7px}
    .stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
      border-radius:10px;padding:8px 5px;text-align:center}
    .s-lbl{font-size:0.58rem;color:var(--muted);margin-bottom:3px}
    .s-val{font-size:0.88rem;font-weight:700}

    /* GEM MENU */
    #gem-menu{flex-shrink:0;padding:8px 0 calc(8px + env(safe-area-inset-bottom));
      background:linear-gradient(to top,rgba(7,7,15,0.99),rgba(7,7,15,0.6));
      border-top:1px solid rgba(255,255,255,0.04);z-index:10}
    .menu-scroll{display:flex;gap:8px;padding:0 14px;overflow-x:auto;scrollbar-width:none;
      -webkit-overflow-scrolling:touch}
    .menu-scroll::-webkit-scrollbar{display:none}
    .gem-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;
      padding:9px 12px;min-width:62px;border-radius:14px;border:1px solid rgba(255,255,255,0.06);
      background:rgba(255,255,255,0.03);cursor:pointer;position:relative;
      transition:background var(--ease),border-color var(--ease),box-shadow var(--ease),transform .15s}
    .gem-chip:active{transform:scale(0.93)}
    .gem-chip.active{border-color:var(--glass-b);background:var(--gold-dim);
      box-shadow:0 0 16px rgba(212,175,55,0.13)}
    .gem-chip.active::before{content:'';position:absolute;top:0;left:22%;right:22%;height:2px;
      border-radius:0 0 2px 2px;background:var(--chip-color,var(--gold))}
    .chip-em{font-size:1.5rem;line-height:1}
    .chip-lbl{font-family:var(--fn-en);font-size:0.58rem;letter-spacing:1px;color:var(--muted);
      text-align:center;transition:color var(--ease)}
    .gem-chip.active .chip-lbl{color:var(--gold-lt)}
    .chip-dot{width:3px;height:3px;border-radius:50%;background:var(--gold);opacity:0;
      transition:opacity .2s;position:absolute;bottom:4px}
    .gem-chip.active .chip-dot{opacity:1}

    /* TOAST */
    #toast-wrap{position:fixed;top:76px;left:50%;transform:translateX(-50%);
      z-index:9000;pointer-events:none;display:flex;flex-direction:column;gap:7px;align-items:center}
    .toast{background:rgba(7,7,15,0.93);border:1px solid var(--glass-b);backdrop-filter:blur(10px);
      border-radius:50px;padding:8px 18px;font-size:0.82rem;white-space:nowrap;
      animation:tIn .3s ease,tOut .4s 2.2s forwards}
    .toast.err{border-color:rgba(224,17,95,0.5);color:#ffb3c6}
    .toast.ok{border-color:rgba(80,200,120,0.5);color:#a8f0c6}
    @keyframes tIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes tOut{to{opacity:0;transform:translateY(-6px)}}

    #https-warn{display:none;position:fixed;top:0;left:0;right:0;z-index:9999;
      padding:10px 16px;text-align:center;background:rgba(140,50,10,0.95);
      backdrop-filter:blur(10px);font-size:0.8rem;color:#ffe8d6;line-height:1.6}
    #https-warn a{color:#ffd700;text-decoration:underline}

    /* HOTSPOTS (work inside model-viewer + during AR) */
    .hotspot{
      --hs-color:var(--gold);
      display:flex;flex-direction:column;align-items:center;gap:2px;
      background:rgba(7,7,15,0.86);backdrop-filter:blur(10px);
      border:1px solid rgba(212,175,55,0.45);border-radius:18px;
      padding:5px 11px;cursor:pointer;color:var(--gold-lt);
      font-family:var(--fn-ar);box-shadow:0 0 16px rgba(212,175,55,0.30);
      pointer-events:auto;transition:transform .18s,box-shadow .25s;white-space:nowrap}
    .hotspot:hover{transform:scale(1.06);box-shadow:0 0 22px rgba(212,175,55,0.50)}
    .hotspot:active{transform:scale(0.92)}
    .hotspot[data-visibility-attribute="visible"]:not([data-visible]){opacity:0.4}
    .hs-icon{font-size:1rem;line-height:1}
    .hs-lbl{font-size:0.56rem;letter-spacing:1px;color:var(--muted)}
    .hotspot.gem-tag{--hs-color:var(--chip,var(--gold));
      border-color:var(--chip,rgba(212,175,55,0.45));
      box-shadow:0 0 16px var(--chip-glow,rgba(212,175,55,0.30))}
    .hotspot.gem-tag .hs-lbl{color:var(--chip,var(--gold-lt))}

    /* PULSE animation for the floating label when glow is triggered */
    @keyframes glowPulse{
      0%,100%{filter:brightness(1) saturate(1)}
      50%{filter:brightness(1.8) saturate(1.6) drop-shadow(0 0 24px currentColor)}
    }
    .fl-en.glowing{animation:glowPulse 1.2s ease-in-out}

    /* In-AR HUD (shows during AR session) */
    #ar-hud{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);
      z-index:30;display:flex;gap:8px;align-items:center;
      background:rgba(7,7,15,0.78);backdrop-filter:blur(14px);
      border:1px solid var(--glass-b);border-radius:50px;
      padding:6px 8px;pointer-events:auto;opacity:0;visibility:hidden;
      transition:opacity .35s,visibility .35s,transform .35s;
      transform:translateX(-50%) translateY(20px)}
    #ar-hud.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
    .hud-btn{display:flex;align-items:center;justify-content:center;
      width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
      background:var(--gold-dim);color:var(--gold-lt);font-size:0.95rem;
      transition:background .2s,transform .15s}
    .hud-btn:hover{background:rgba(212,175,55,0.32)}
    .hud-btn:active{transform:scale(0.9)}
    .hud-label{padding:0 12px;font-size:0.76rem;color:var(--gold-lt);
      letter-spacing:1px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* Multi-AR merge progress */
    #merge-overlay{position:absolute;inset:0;z-index:9;
      display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
      background:rgba(7,7,15,0.82);backdrop-filter:blur(12px)}
    #merge-overlay.show{display:flex}
    .merge-title{font-family:var(--fn-en);font-size:0.95rem;letter-spacing:3px;color:var(--gold)}
    .merge-sub{font-size:0.76rem;color:var(--muted)}
    .merge-icons{display:flex;gap:14px;font-size:2rem;align-items:center}
    .merge-icons .plus{color:var(--muted);font-size:1.1rem;opacity:0.5}
  </style>
</head>
<body>
<div id="https-warn"></div>
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div>
      <div class="tb-logo">GEMS AR</div>
      <div class="tb-sub">معرض الأحجار الكريمة</div>
    </div>
    <div class="tb-actions">
      <button class="btn btn-multi" id="multi-btn" onclick="openMultiPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>AR متعدد</span>
      </button>
      <button class="btn" id="ar-btn" disabled onclick="enterAR()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span id="ar-btn-txt">جارٍ التحميل…</span>
      </button>
    </div>
  </div>

  <!-- VIEWER -->
  <div id="viewer-wrap">
    <model-viewer id="mv" src="" alt="3D gem"
      ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto"
      camera-controls auto-rotate auto-rotate-delay="1000" rotation-per-second="22deg"
      shadow-intensity="1.6" shadow-softness="0.9" exposure="1.2"
      environment-image="neutral" interaction-prompt="auto"
      style="background:transparent;">
      <button slot="ar-button" style="display:none"></button>

      <!-- HOTSPOTS (visible in viewer AND during WebXR AR) -->
      <button class="hotspot" slot="hotspot-info"
              data-position="0 0.45 0" data-normal="0 1 0"
              data-visibility-attribute="visible">
        <span class="hs-icon">ℹ</span><span class="hs-lbl">معلومات</span>
      </button>
      <button class="hotspot" slot="hotspot-cycle"
              data-position="0.55 0 0" data-normal="1 0 0"
              data-visibility-attribute="visible">
        <span class="hs-icon">↻</span><span class="hs-lbl">تبديل</span>
      </button>
      <button class="hotspot" slot="hotspot-glow"
              data-position="-0.55 0 0" data-normal="-1 0 0"
              data-visibility-attribute="visible">
        <span class="hs-icon">✨</span><span class="hs-lbl">توهج</span>
      </button>

      <!-- AR HUD: shown during AR sessions -->
      <div id="ar-hud">
        <button class="hud-btn" id="hud-prev" title="السابق">‹</button>
        <div class="hud-label" id="hud-label">—</div>
        <button class="hud-btn" id="hud-next" title="التالي">›</button>
        <button class="hud-btn" id="hud-glow" title="توهج">✨</button>
      </div>
    </model-viewer>

    <!-- Merge overlay (multi-AR build progress) -->
    <div id="merge-overlay">
      <div class="merge-title">DAMJ AR</div>
      <div class="merge-icons" id="merge-icons"></div>
      <div class="ring"></div>
      <div class="merge-sub" id="merge-sub">جارٍ دمج النماذج…</div>
    </div>

    <div id="mv-loader">
      <div class="ring"></div>
      <div class="loader-txt" id="loader-txt">جارٍ التهيئة…</div>
      <div class="progress-wrap"><div id="progress-bar"></div></div>
    </div>

    <div id="float-label">
      <div class="fl-en" id="fl-en">—</div>
      <div class="fl-ar" id="fl-ar">—</div>
    </div>

    <div id="hint">↕ اسحب للتدوير • قرص للتكبير</div>
    <div id="status-badge"></div>

    <!-- MULTI AR PANEL -->
    <div id="multi-panel">
      <div class="mp-title">AR متعدد</div>
      <div class="mp-sub">اختر الأحجار التي تريد دمجها في مشهد واحد</div>
      <div class="mp-grid" id="mp-grid"></div>
      <div class="mp-count" id="mp-count">لم تختر بعد</div>
      <div class="mp-note">✦ النماذج المختارة ستُدمج فعلياً جنباً إلى جنب في مشهد AR واحد قابل للتفاعل</div>
      <div class="mp-actions">
        <button class="btn" onclick="closeMultiPanel()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          إلغاء
        </button>
        <button class="btn btn-multi" id="mp-launch-btn" onclick="launchMultiAR()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          افتح AR
        </button>
      </div>
    </div>
  </div>

import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

/* ── Helpers: ArrayBuffer → base64 data URL ── */
function ab2b64(buf){
  const u8=new Uint8Array(buf); let s='';
  const CHUNK=0x8000;
  for(let i=0;i<u8.length;i+=CHUNK){
    s+=String.fromCharCode.apply(null,u8.subarray(i,i+CHUNK));
  }
  return btoa(s);
}
function glbToDataURL(buf){return 'data:model/gltf-binary;base64,'+ab2b64(buf)}

function exportToGLB(object){
  return new Promise((resolve,reject)=>{
    const exporter=new GLTFExporter();
    exporter.parse(object,(result)=>{
      if(result instanceof ArrayBuffer) resolve(glbToDataURL(result));
      else reject(new Error('Expected binary GLB'));
    },(err)=>reject(err),{binary:true});
  });
}

const _loader=new GLTFLoader();
function loadGLB(url){
  return new Promise((resolve,reject)=>_loader.load(url,(g)=>resolve(g.scene),undefined,reject));
}

/* ── Build a procedural Silver Ingot (chamfered bar) ── */
function makeSilverIngot(){
  const w=0.55,h=0.20,r=0.06;
  const shape=new THREE.Shape();
  shape.moveTo(-w+r,-h);
  shape.lineTo(w-r,-h);
  shape.quadraticCurveTo(w,-h,w,-h+r);
  shape.lineTo(w,h-r);
  shape.quadraticCurveTo(w,h,w-r,h);
  shape.lineTo(-w+r,h);
  shape.quadraticCurveTo(-w,h,-w,h-r);
  shape.lineTo(-w,-h+r);
  shape.quadraticCurveTo(-w,-h,-w+r,-h);
  const geom=new THREE.ExtrudeGeometry(shape,{
    depth:0.30,bevelEnabled:true,
    bevelThickness:0.045,bevelSize:0.045,bevelSegments:5,
    steps:1,curveSegments:14
  });
  geom.center(); geom.computeVertexNormals();
  // Lay flat on its broad side and tilt forward a touch
  geom.rotateX(-Math.PI/2);
  geom.rotateY(Math.PI/14);
  const mat=new THREE.MeshStandardMaterial({
    color:0xEDEDF2, metalness:1.0, roughness:0.16,
  });
  return new THREE.Mesh(geom,mat);
}

async function buildSilverGLB(){
  const scene=new THREE.Scene();
  scene.add(makeSilverIngot());
  return await exportToGLB(scene);
}

/* ── Merge selected gems into one side-by-side GLB ── */
async function buildMergedGLB(ids){
  const root=new THREE.Group();
  const spacing=0.55;
  const targetSize=0.35;
  const positions=[];

  for(let i=0;i<ids.length;i++){
    const id=ids[i];
    const dataUrl=GEM_GLB[id];
    if(!dataUrl) continue;
    let scene;
    try{ scene=await loadGLB(dataUrl); }
    catch(err){ console.warn('skip',id,err); continue; }

    // Normalize scale via bounding box
    const box=new THREE.Box3().setFromObject(scene);
    const size=new THREE.Vector3(); box.getSize(size);
    const maxDim=Math.max(size.x,size.y,size.z)||1;
    scene.scale.setScalar(targetSize/maxDim);

    // Recenter at origin
    const nbox=new THREE.Box3().setFromObject(scene);
    const center=new THREE.Vector3(); nbox.getCenter(center);
    scene.position.sub(center);

    // Lay out on x-axis
    const xPos=(i-(ids.length-1)/2)*spacing;
    scene.position.x+=xPos;
    scene.name='gem_'+id;
    positions.push({id,x:xPos});
    root.add(scene);
  }
  const dataUrl=await exportToGLB(root);
  return {dataUrl,positions};
}

let activeIdx=0, modelLoaded=false;
const multiSelected=new Set();

/* HTTPS check */
(function(){
  const ok=location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1';
  if(!ok){const w=document.getElementById('https-warn');w.style.display='block';
    w.innerHTML='⚠️ AR يحتاج <strong>HTTPS</strong> — ارفع على <a href="https://pages.github.com" target="_blank">GitHub Pages</a>';}
})();

let _st;
function showStatus(msg){statusBadge.textContent=msg;statusBadge.classList.add('show');
  clearTimeout(_st);_st=setTimeout(()=>statusBadge.classList.remove('show'),5000)}

/* ── BUILD MENUS ── */
function buildMenu(){
  const s=document.getElementById('menu-scroll');
  GEMS.forEach((gem,i)=>{
    const c=document.createElement('div');
    c.className='gem-chip'+(i===0?' active':'');
    c.style.setProperty('--chip-color',gem.color);
    c.innerHTML=`<span class="chip-em">${gem.icon}</span><span class="chip-lbl">${gem.nameEN}</span><span class="chip-dot"></span>`;
    c.addEventListener('click',()=>selectGem(i));
    s.appendChild(c);
  });
}

function buildMultiGrid(){
  const g=document.getElementById('mp-grid');
  GEMS.forEach((gem,i)=>{
    const c=document.createElement('div');
    c.className='mp-chip';
    c.id=`mp-${gem.id}`;
    c.innerHTML=`<span class="mp-em">${gem.icon}</span><span class="mp-lbl">${gem.nameEN}</span>`;
    c.addEventListener('click',()=>toggleMultiSelect(gem.id));
    g.appendChild(c);
  });
}

/* ── STATE: mode tracking ── */
let mode='single';                 // 'single' | 'merged'
let mergedIds=[];                  // current merged gem ids
let mergedHotspotIdx=0;            // cycle index for multi mode
const hsInfo=document.querySelector('[slot="hotspot-info"]');
const hsCycle=document.querySelector('[slot="hotspot-cycle"]');
const hsGlow=document.querySelector('[slot="hotspot-glow"]');
const arHud=document.getElementById('ar-hud');
const hudLabel=document.getElementById('hud-label');
const mergeOverlay=document.getElementById('merge-overlay');
const mergeIcons=document.getElementById('merge-icons');
const mergeSub=document.getElementById('merge-sub');

/* ── HOTSPOTS: show/hide depending on mode ── */
function setHotspotsForMode(){
  // We always show the 3 generic hotspots. In merged mode they apply to "current" gem.
  // Additionally, in merged mode we inject per-gem tags above each model.
  document.querySelectorAll('.hotspot.gem-tag').forEach(el=>el.remove());
  if(mode==='merged' && mergedIds.length){
    const spacing=0.55;
    mergedIds.forEach((id,i)=>{
      const gem=GEMS.find(g=>g.id===id); if(!gem)return;
      const x=(i-(mergedIds.length-1)/2)*spacing;
      const btn=document.createElement('button');
      btn.className='hotspot gem-tag';
      btn.setAttribute('slot',`hotspot-gem-${i}`);
      btn.setAttribute('data-position',`${x.toFixed(3)} 0.30 0`);
      btn.setAttribute('data-normal','0 1 0');
      btn.style.setProperty('--chip',gem.color);
      btn.style.setProperty('--chip-glow',gem.color+'66');
      btn.innerHTML=`<span class="hs-icon">${gem.icon}</span><span class="hs-lbl">${gem.nameEN}</span>`;
      btn.addEventListener('click',()=>{
        mergedHotspotIdx=i;
        showInfoForGem(gem);
        flashGlow(gem.color);
      });
      mv.appendChild(btn);
    });
  }
}

/* ── SELECT GEM (single mode) ── */
function selectGem(idx){
  if(mode==='single' && idx===activeIdx && modelLoaded) return;
  mode='single'; mergedIds=[];
  activeIdx=idx; modelLoaded=false;
  const gem=GEMS[idx];
  document.querySelectorAll('.gem-chip').forEach((c,i)=>{c.classList.toggle('active',i===idx);c.style.setProperty('--chip-color',GEMS[i].color)});
  document.getElementById('menu-scroll').children[idx].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  arBtn.disabled=true; arBtnTxt.textContent='جارٍ التحميل…';
  mvLoader.classList.remove('hidden'); loaderTxt.textContent=gem.nameAR; progressBar.style.width='10%';
  flEN.textContent=gem.nameEN; flEN.style.color=gem.color;
  flEN.style.textShadow=`0 0 28px ${gem.color}66`; flAR.textContent=gem.nameAR;
  document.getElementById('c-emoji').textContent=gem.icon;
  document.getElementById('c-emoji').style.background=gem.color+'22';
  document.getElementById('c-emoji').style.boxShadow=`0 0 18px ${gem.color}44`;
  document.getElementById('c-en').textContent=gem.nameEN;
  document.getElementById('c-ar').textContent=gem.nameAR;
  document.getElementById('c-desc').textContent=gem.desc;
  document.getElementById('s-hard').textContent=gem.hardness;
  document.getElementById('s-dens').textContent=gem.density;
  document.getElementById('s-orig').textContent=gem.origin;
  document.getElementById('s-hard').style.color=gem.color;
  document.getElementById('info-card').style.borderTopColor=gem.color+'50';
  progressBar.style.width='50%';
  mv.src=GEM_GLB[gem.id];
  setHotspotsForMode();
  hudLabel.textContent=`${gem.icon} ${gem.nameAR}`;
  toast('✦ '+gem.nameAR);
  const h=document.getElementById('hint');
  h.style.animation='none'; void h.offsetWidth;
  h.style.animation='hintFade 3s ease 0.5s forwards';
}

/* ── HOTSPOT HANDLERS ── */
let _hudTimer=null;
function showInfoForGem(gem){
  const msg=`${gem.icon} ${gem.nameAR} — صلابة ${gem.hardness} • كثافة ${gem.density}`;
  if(arHud.classList.contains('show')){
    // We're inside AR — toasts don't show through dom-overlay, use HUD label
    const orig=hudLabel.textContent;
    hudLabel.textContent=msg;
    clearTimeout(_hudTimer);
    _hudTimer=setTimeout(()=>{hudLabel.textContent=orig;_hudTimer=null},3200);
  } else {
    toast(msg,'ok');
  }
}
hsInfo.addEventListener('click',()=>{
  if(mode==='merged'){
    const gem=GEMS.find(g=>g.id===mergedIds[mergedHotspotIdx]); if(gem) showInfoForGem(gem);
  } else {
    showInfoForGem(GEMS[activeIdx]);
  }
});
hsCycle.addEventListener('click',()=>{
  if(mode==='merged'){
    mergedHotspotIdx=(mergedHotspotIdx+1)%mergedIds.length;
    const gem=GEMS.find(g=>g.id===mergedIds[mergedHotspotIdx]);
    if(gem){hudLabel.textContent=`${gem.icon} ${gem.nameAR}`; flashGlow(gem.color); showInfoForGem(gem)}
  } else {
    const next=(activeIdx+1)%GEMS.length;
    selectGem(next);
  }
});
hsGlow.addEventListener('click',()=>{
  const color=(mode==='merged')
    ? (GEMS.find(g=>g.id===mergedIds[mergedHotspotIdx])?.color||'#D4AF37')
    : GEMS[activeIdx].color;
  flashGlow(color);
});

/* ── GLOW EFFECT: pulse exposure + label ── */
let _glowing=false;
function flashGlow(color){
  if(_glowing) return; _glowing=true;
  const orig=parseFloat(mv.getAttribute('exposure')||'1.2');
  const start=performance.now(); const DUR=1100;
  function tick(now){
    const t=(now-start)/DUR;
    if(t>=1){ mv.setAttribute('exposure',String(orig)); _glowing=false; return; }
    const k=Math.sin(t*Math.PI); // 0→1→0
    mv.setAttribute('exposure',String(orig + k*1.5));
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  flEN.classList.remove('glowing'); void flEN.offsetWidth; flEN.classList.add('glowing');
  flEN.style.color=color;
  flEN.style.textShadow=`0 0 28px ${color}, 0 0 60px ${color}88`;
}

/* ── MODEL VIEWER EVENTS ── */
mv.addEventListener('progress',(e)=>{progressBar.style.width=Math.max(50,Math.round(e.detail.totalProgress*100))+'%'});
mv.addEventListener('load',()=>{
  modelLoaded=true; mvLoader.classList.add('hidden'); progressBar.style.width='100%';
  if(mv.canActivateAR){arBtn.disabled=false;arBtnTxt.textContent='وضع AR';showStatus('✓ جاهز — AR متاح')}
  else{arBtn.disabled=true;arBtnTxt.textContent='AR غير مدعوم';showStatus('⚠️ يحتاج HTTPS + موبايل')}
});
mv.addEventListener('error',()=>{mvLoader.classList.add('hidden');arBtn.disabled=true;arBtnTxt.textContent='خطأ';toast('⚠️ خطأ في التحميل','err')});
mv.addEventListener('ar-status',(e)=>{
  const st=e.detail.status;
  if(st==='session-started'){toast('✓ وضع AR نشط','ok'); arHud.classList.add('show')}
  if(st==='not-presenting'){arBtn.disabled=false;arBtnTxt.textContent='وضع AR'; arHud.classList.remove('show')}
  if(st==='failed'){toast('⚠️ فشل AR','err');arBtn.disabled=false;arBtnTxt.textContent='وضع AR'; arHud.classList.remove('show')}
});

/* ── AR HUD CONTROLS (in-AR) ── */
document.getElementById('hud-prev').addEventListener('click',()=>{
  if(mode==='merged'){
    mergedHotspotIdx=(mergedHotspotIdx-1+mergedIds.length)%mergedIds.length;
    const gem=GEMS.find(g=>g.id===mergedIds[mergedHotspotIdx]);
    if(gem){hudLabel.textContent=`${gem.icon} ${gem.nameAR}`; flashGlow(gem.color)}
  } else {
    const prev=(activeIdx-1+GEMS.length)%GEMS.length;
    selectGem(prev);
  }
});
document.getElementById('hud-next').addEventListener('click',()=>{
  if(mode==='merged'){
    mergedHotspotIdx=(mergedHotspotIdx+1)%mergedIds.length;
    const gem=GEMS.find(g=>g.id===mergedIds[mergedHotspotIdx]);
    if(gem){hudLabel.textContent=`${gem.icon} ${gem.nameAR}`; flashGlow(gem.color)}
  } else {
    const next=(activeIdx+1)%GEMS.length;
    selectGem(next);
  }
});
document.getElementById('hud-glow').addEventListener('click',()=>{
  const color=(mode==='merged')
    ? (GEMS.find(g=>g.id===mergedIds[mergedHotspotIdx])?.color||'#D4AF37')
    : GEMS[activeIdx].color;
  flashGlow(color);
});

/* ── ENTER AR (single) ── */
function enterAR(){
  if(!modelLoaded){toast('⚠️ انتظر التحميل','err');return}
  if(!mv.canActivateAR){
    if(location.protocol!=='https:'&&location.hostname!=='localhost')toast('⚠️ يحتاج HTTPS','err');
    else if(!/android|iphone|ipad/i.test(navigator.userAgent))toast('⚠️ AR على الموبايل فقط','err');
    else toast('⚠️ جهازك لا يدعم ARCore/Quick Look','err');
    return;
  }
  mv.activateAR();
}

/* ── MULTI AR PANEL ── */
function openMultiPanel(){document.getElementById('multi-panel').classList.add('show')}
function closeMultiPanel(){document.getElementById('multi-panel').classList.remove('show')}

function toggleMultiSelect(id){
  if(multiSelected.has(id)) multiSelected.delete(id);
  else if(multiSelected.size<4) multiSelected.add(id);
  else{toast('⚠️ 4 أحجار كحد أقصى','err');return}
  document.querySelectorAll('.mp-chip').forEach(c=>{
    const cid=c.id.replace('mp-','');
    c.classList.toggle('selected',multiSelected.has(cid));
  });
  const n=multiSelected.size;
  const countEl=document.getElementById('mp-count');
  countEl.textContent = n===0?'لم تختر بعد':` ${n} حجر${n>1?'':''}  مختار`;
  document.getElementById('mp-launch-btn').disabled=(n<2);
}

/* ── LAUNCH MULTI-AR via real merging ── */
async function launchMultiAR(){
  if(!mv.canActivateAR){toast('⚠️ AR غير متاح على هذا الجهاز','err'); return}
  const chosen=[...multiSelected];
  if(chosen.length<2){toast('⚠️ اختر حجرين على الأقل','err');return}

  closeMultiPanel();

  // Show merge overlay
  mergeIcons.innerHTML = chosen.map((id,i)=>{
    const g=GEMS.find(g=>g.id===id);
    return (i>0?'<span class="plus">+</span>':'') + `<span>${g?.icon||'◆'}</span>`;
  }).join('');
  mergeSub.textContent='جارٍ دمج النماذج…';
  mergeOverlay.classList.add('show');

  try{
    const {dataUrl,positions}=await buildMergedGLB(chosen);
    mode='merged'; mergedIds=chosen.slice(); mergedHotspotIdx=0;
    modelLoaded=false;

    // Update UI labels for merged
    const names=chosen.map(id=>GEMS.find(g=>g.id===id)?.nameEN||'').join(' • ');
    const namesAR=chosen.map(id=>GEMS.find(g=>g.id===id)?.nameAR||'').join(' • ');
    flEN.textContent=`${chosen.length}× GEMS`;
    flEN.style.color='var(--gold)';
    flEN.style.textShadow='0 0 28px rgba(212,175,55,0.45)';
    flAR.textContent=namesAR;
    hudLabel.textContent = `${chosen.length} أحجار مدموجة`;

    // Update info panel to multi
    document.getElementById('c-emoji').textContent='✦';
    document.getElementById('c-emoji').style.background='rgba(212,175,55,0.14)';
    document.getElementById('c-emoji').style.boxShadow='0 0 18px rgba(212,175,55,0.30)';
    document.getElementById('c-en').textContent='MULTI SCENE';
    document.getElementById('c-ar').textContent=namesAR;
    document.getElementById('c-desc').textContent='مشهد AR مدموج — اضغط أيقونة أي حجر لتفاصيله أو استخدم زر التبديل للتنقل بينها.';
    document.getElementById('s-hard').textContent=chosen.length+' / 11';
    document.getElementById('s-dens').textContent='—';
    document.getElementById('s-orig').textContent='مشهد مركّب';

    // Load merged into model-viewer
    mvLoader.classList.remove('hidden'); loaderTxt.textContent='تجهيز المشهد المدموج…';
    progressBar.style.width='40%';
    arBtn.disabled=true; arBtnTxt.textContent='جارٍ التحميل…';

    mergeSub.textContent='✓ تم الدمج — جارٍ التحميل…';
    mv.src=dataUrl;
    setHotspotsForMode();

    // Wait for load, then enter AR
    await new Promise((resolve,reject)=>{
      const onL=()=>{mv.removeEventListener('load',onL); mv.removeEventListener('error',onE); resolve()};
      const onE=()=>{mv.removeEventListener('load',onL); mv.removeEventListener('error',onE); reject(new Error('model load failed'))};
      mv.addEventListener('load',onL);
      mv.addEventListener('error',onE);
    });
    mergeOverlay.classList.remove('show');
    toast(`✦ ${chosen.length} أحجار جاهزة للـ AR`,'ok');
    setTimeout(()=>{
      if(mv.canActivateAR) mv.activateAR();
      else toast('⚠️ تعذّر فتح AR','err');
    },300);
  }catch(err){
    console.error(err);
    mergeOverlay.classList.remove('show');
    toast('⚠️ فشل دمج النماذج','err');
  }
}

/* ── TOGGLE INFO ── */
function toggleInfo(){document.getElementById('info-panel').classList.toggle('collapsed')}

/* ── TOAST ── */
function toast(msg,type=''){
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.textContent=msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>el.remove(),2900);
}

/* ── INIT ── */
async function init(){
  // Generate the procedural silver ingot and replace its entry
  try{
    showStatus('تجهيز نموذج الفضة…');
    const silverURL=await buildSilverGLB();
    GEM_GLB.silver=silverURL;
  }catch(e){
    console.warn('Silver gen failed:',e);
  }
  buildMenu();
  buildMultiGrid();
  selectGem(0);
}

/* Expose globals for inline onclick handlers */
window.enterAR=enterAR;
window.openMultiPanel=openMultiPanel;
window.closeMultiPanel=closeMultiPanel;
window.launchMultiAR=launchMultiAR;
window.toggleInfo=toggleInfo;

init();
</script>
</body>
</html>
