<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gemstones AR — معرض الأحجار الكريمة</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Model Viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    /* ══════════════════════════════════════
       DESIGN TOKENS
    ══════════════════════════════════════ */
    :root {
      --gold:       #D4AF37;
      --gold-light: #F5D76E;
      --gold-dim:   rgba(212,175,55,0.18);
      --glass-bg:   rgba(8, 8, 18, 0.72);
      --glass-border: rgba(212,175,55,0.22);
      --surface:    rgba(14, 14, 28, 0.85);
      --text-main:  #f0ece0;
      --text-muted: rgba(240,236,224,0.5);
      --radius-lg:  20px;
      --radius-md:  14px;
      --radius-sm:  10px;
      --font-en:    'Cinzel', serif;
      --font-ar:    'Tajawal', sans-serif;
      --transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ══════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════ */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #060610;
      color: var(--text-main);
      font-family: var(--font-ar);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ══════════════════════════════════════
       BACKGROUND GRADIENT
    ══════════════════════════════════════ */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(212,175,55,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 80% 80%, rgba(100,60,200,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ══════════════════════════════════════
       APP SHELL
    ══════════════════════════════════════ */
    #app {
      position: fixed; inset: 0; z-index: 1;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════
       TOP BAR
    ══════════════════════════════════════ */
    #topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      background: linear-gradient(to bottom, rgba(6,6,16,0.95), transparent);
      position: relative; z-index: 10;
    }

    .tb-logo {
      font-family: var(--font-en);
      font-size: 1.1rem;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      animation: logoGlow 4s ease-in-out infinite;
    }
    @keyframes logoGlow {
      0%,100% { text-shadow: 0 0 12px rgba(212,175,55,0.3); }
      50%      { text-shadow: 0 0 28px rgba(212,175,55,0.7); }
    }

    .tb-subtitle {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* AR button styled via slot */
    #ar-trigger-wrap {
      position: relative;
    }
    .ar-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      background: var(--gold-dim);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      font-family: var(--font-ar);
      font-size: 0.82rem;
      color: var(--gold-light);
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }
    .ar-pill:hover  { background: rgba(212,175,55,0.28); }
    .ar-pill:active { transform: scale(0.95); }
    .ar-pill svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ══════════════════════════════════════
       MODEL VIEWER — main stage
    ══════════════════════════════════════ */
    #viewer-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background-color: transparent;
      --poster-color: transparent;
    }

    /* Hide default AR button — we use our own */
    model-viewer::part(default-ar-button) { display: none; }

    /* Loading overlay inside viewer */
    .viewer-loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(6,6,16,0.6);
      backdrop-filter: blur(6px);
      z-index: 5;
      transition: opacity 0.4s, visibility 0.4s;
    }
    .viewer-loader.hidden { opacity: 0; visibility: hidden; }

    .loader-ring {
      width: 52px; height: 52px;
      border: 3px solid rgba(212,175,55,0.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* Gem name floating label */
    #gem-float-label {
      position: absolute;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      pointer-events: none;
      transition: opacity var(--transition);
    }
    .float-name-en {
      font-family: var(--font-en);
      font-size: clamp(1.4rem, 5vw, 2rem);
      letter-spacing: 4px;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(212,175,55,0.5);
    }
    .float-name-ar {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* Interaction hint */
    #hint {
      position: absolute;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      font-size: 0.72rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      animation: fadeHint 4s ease 1.5s forwards;
      opacity: 0;
    }
    @keyframes fadeHint {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }
    .hint-icon { font-size: 1rem; }

    /* ══════════════════════════════════════
       INFO CARD (slides up from bottom)
    ══════════════════════════════════════ */
    #info-panel {
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    /* Toggle tab */
    #info-toggle {
      position: absolute;
      top: -36px; left: 50%;
      transform: translateX(-50%);
      width: 80px; height: 28px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
      backdrop-filter: blur(12px);
    }
    .toggle-arrow {
      width: 28px; height: 3px;
      background: rgba(212,175,55,0.45);
      border-radius: 2px;
      position: relative;
      transition: transform 0.3s;
    }
    .toggle-arrow::before, .toggle-arrow::after {
      content: '';
      position: absolute;
      width: 14px; height: 3px;
      background: rgba(212,175,55,0.45);
      border-radius: 2px;
      top: -5px;
    }
    .toggle-arrow::before { left: 1px;  transform: rotate(40deg); transform-origin: right; }
    .toggle-arrow::after  { right: 1px; transform: rotate(-40deg); transform-origin: left; }
    #info-panel.collapsed .toggle-arrow::before { top: 5px; transform: rotate(-40deg); transform-origin: right; }
    #info-panel.collapsed .toggle-arrow::after  { top: 5px; transform: rotate(40deg);  transform-origin: left; }

    /* Card body */
    #info-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border-top: 1px solid var(--glass-border);
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 40vh;
      overflow-y: auto;
      transition: max-height var(--transition), padding var(--transition);
    }
    #info-panel.collapsed #info-card {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      overflow: hidden;
    }

    /* Card header */
    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .gem-emoji-wrap {
      width: 50px; height: 50px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .card-titles { flex: 1; min-width: 0; }
    .card-name-en {
      font-family: var(--font-en);
      font-size: 1.15rem;
      color: var(--gold);
      letter-spacing: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-name-ar {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Description */
    .card-desc {
      font-size: 0.84rem;
      color: rgba(240,236,224,0.72);
      line-height: 1.75;
      border-right: 2px solid var(--glass-border);
      padding-right: 12px;
    }

    /* Stats */
    .card-stats {
      display: flex;
      gap: 8px;
    }
    .stat-box {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-sm);
      padding: 9px 6px;
      text-align: center;
    }
    .stat-lbl { font-size: 0.6rem;  color: var(--text-muted); margin-bottom: 4px; }
    .stat-val { font-size: 0.92rem; font-weight: 700; }

    /* ══════════════════════════════════════
       BOTTOM GEM MENU
    ══════════════════════════════════════ */
    #gem-menu {
      flex-shrink: 0;
      padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(6,6,16,0.98), rgba(6,6,16,0.7));
      border-top: 1px solid rgba(255,255,255,0.05);
      position: relative; z-index: 10;
    }

    .menu-scroll {
      display: flex;
      gap: 10px;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .menu-scroll::-webkit-scrollbar { display: none; }

    .gem-chip {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition),
                  transform var(--transition), box-shadow var(--transition);
      min-width: 68px;
      position: relative;
    }
    .gem-chip:active { transform: scale(0.93); }

    .gem-chip.active {
      border-color: var(--glass-border);
      background: var(--gold-dim);
      box-shadow: 0 0 16px rgba(212,175,55,0.15);
    }

    .chip-emoji { font-size: 1.6rem; line-height: 1; }

    .chip-name-en {
      font-family: var(--font-en);
      font-size: 0.6rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-align: center;
      transition: color var(--transition);
    }
    .gem-chip.active .chip-name-en { color: var(--gold-light); }

    /* Active dot indicator */
    .chip-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      transition: opacity 0.2s;
      position: absolute;
      bottom: 5px;
    }
    .gem-chip.active .chip-dot { opacity: 1; }

    /* Color accent line on active chip */
    .gem-chip.active::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 2px;
      border-radius: 0 0 2px 2px;
      background: var(--chip-color, var(--gold));
    }

    /* ══════════════════════════════════════
       TOAST
    ══════════════════════════════════════ */
    #toast-wrap {
      position: fixed;
      top: 80px; left: 50%;
      transform: translateX(-50%);
      z-index: 9000;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    .toast {
      background: rgba(8,8,20,0.92);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 8px 20px;
      font-size: 0.84rem;
      white-space: nowrap;
      animation: toastIn .3s ease, toastOut .4s 2.2s forwards;
    }
    @keyframes toastIn  { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { to   { opacity:0; transform:translateY(-6px); } }

    /* ══════════════════════════════════════
       AR NOT SUPPORTED BADGE
    ══════════════════════════════════════ */
    #no-ar-note {
      display: none;
      position: absolute;
      bottom: 12px; left: 50%;
      transform: translateX(-50%);
      z-index: 7;
      font-size: 0.72rem;
      color: var(--text-muted);
      background: rgba(8,8,20,0.7);
      padding: 6px 14px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.07);
      white-space: nowrap;
    }

    /* ══════════════════════════════════════
       RESPONSIVE — larger screens
    ══════════════════════════════════════ */
    @media (min-width: 640px) {
      #app { flex-direction: row; flex-wrap: wrap; }
      #topbar { width: 100%; }
      #viewer-wrap { flex: 1; order: 2; }
      #info-panel {
        width: 320px;
        order: 3;
        flex-shrink: 0;
      }
      #info-card { max-height: 100%; }
      #info-toggle { display: none; }
      #gem-menu {
        width: 100%;
        order: 4;
      }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ══ TOP BAR ══ -->
  <div id="topbar">
    <div>
      <div class="tb-logo">Gems AR</div>
      <div class="tb-subtitle">معرض الأحجار الكريمة</div>
    </div>

    <div id="ar-trigger-wrap">
      <!-- زر AR مخصص يستدعي model-viewer's AR -->
      <button class="ar-pill" id="ar-btn" onclick="enterAR()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        وضع AR
      </button>
    </div>
  </div>

  <!-- ══ MODEL VIEWER STAGE ══ -->
  <div id="viewer-wrap">

    <model-viewer
      id="mv"
      src="models/diamond.glb"
      alt="3D gem model"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-scale="auto"
      camera-controls
      auto-rotate
      auto-rotate-delay="500"
      rotation-per-second="30deg"
      shadow-intensity="1.2"
      shadow-softness="0.8"
      exposure="1.1"
      environment-image="neutral"
      interaction-prompt="none"
      style="background: transparent;">

      <!-- slot: custom AR button (required by model-viewer spec) -->
      <button slot="ar-button" style="display:none"></button>

    </model-viewer>

    <!-- Loading overlay -->
    <div class="viewer-loader" id="viewer-loader">
      <div class="loader-ring"></div>
      <div class="loader-text">جارٍ تحميل النموذج…</div>
    </div>

    <!-- Gem floating label -->
    <div id="gem-float-label">
      <div class="float-name-en" id="float-en">Diamond</div>
      <div class="float-name-ar" id="float-ar">الماس</div>
    </div>

    <!-- Interaction hint -->
    <div id="hint">
      <span class="hint-icon">👆</span>
      <span>اسحب لتدوير • انقر مرتين للتكبير</span>
    </div>

    <!-- AR not supported note -->
    <div id="no-ar-note">⚠️ جهازك لا يدعم وضع AR</div>

  </div>

  <!-- ══ INFO PANEL ══ -->
  <div id="info-panel">
    <div id="info-toggle" onclick="toggleInfo()">
      <div class="toggle-arrow"></div>
    </div>

    <div id="info-card">
      <div class="card-header">
        <div class="gem-emoji-wrap" id="c-emoji">💎</div>
        <div class="card-titles">
          <div class="card-name-en" id="c-en">Diamond</div>
          <div class="card-name-ar" id="c-ar">الماس</div>
        </div>
      </div>
      <p class="card-desc" id="c-desc"></p>
      <div class="card-stats">
        <div class="stat-box">
          <div class="stat-lbl">صلابة موز</div>
          <div class="stat-val" id="c-hard">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-lbl">الكثافة</div>
          <div class="stat-val" id="c-dens">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-lbl">المنشأ</div>
          <div class="stat-val" id="c-orig">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ GEM MENU ══ -->
  <div id="gem-menu">
    <div class="menu-scroll" id="menu-scroll">
      <!-- Chips injected by JS -->
    </div>
  </div>

</div>

<!-- ══ TOASTS ══ -->
<div id="toast-wrap"></div>

<script>
/* ══════════════════════════════════════════════
   DATA — بيانات الأحجار السبعة
══════════════════════════════════════════════ */

    desc:     'معدن ثمين خالد عُرف منذ فجر الحضارة، يتميز بمقاومته الفائقة للتآكل ولمعانه الأبدي. شكّل عبر التاريخ أساس الاقتصاد العالمي واحتياطيات البنوك المركزية.',
    hardness: '2.5 / 10',
    density:  '19.3 g/cm³',
    origin:   'جنوب أفريقيا • الصين'
  },
  {
    id:       'silver',
    nameEN:   'Silver',
    nameAR:   'الفضة',
    icon:     '🥈',
    color:    '#C8C8D0',
    model:    'models/silver.glb',
    desc:     'يتربع الفضة على عرش الموصلات الكهربائية والحرارية بين جميع المعادن. يُستخدم على نطاق واسع في المجوهرات والعملات والإلكترونيات والأجهزة الطبية.',
    hardness: '2.7 / 10',
    density:  '10.5 g/cm³',
    origin:   'المكسيك • البيرو'
  }
];

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let activeIndex = 0;

/* ══════════════════════════════════════════════
   ELEMENTS
══════════════════════════════════════════════ */
const mv           = document.getElementById('mv');
const loader       = document.getElementById('viewer-loader');
const floatEN      = document.getElementById('float-en');
const floatAR      = document.getElementById('float-ar');
const cEmoji       = document.getElementById('c-emoji');
const cEN          = document.getElementById('c-en');
const cAR          = document.getElementById('c-ar');
const cDesc        = document.getElementById('c-desc');
const cHard        = document.getElementById('c-hard');
const cDens        = document.getElementById('c-dens');
const cOrig        = document.getElementById('c-orig');
const menuScroll   = document.getElementById('menu-scroll');
const noArNote     = document.getElementById('no-ar-note');

/* ══════════════════════════════════════════════
   BUILD MENU
══════════════════════════════════════════════ */
function buildMenu() {
  GEMS.forEach((gem, i) => {
    const chip = document.createElement('div');
    chip.className = 'gem-chip' + (i === 0 ? ' active' : '');
    chip.style.setProperty('--chip-color', gem.color);
    chip.dataset.index = i;
    chip.innerHTML = `
      <span class="chip-emoji">${gem.icon}</span>
      <span class="chip-name-en">${gem.nameEN}</span>
      <span class="chip-dot"></span>
    `;
    chip.addEventListener('click', () => selectGem(i));
    menuScroll.appendChild(chip);
  });
}

/* ══════════════════════════════════════════════
   SELECT GEM
══════════════════════════════════════════════ */
function selectGem(index) {
  if (index === activeIndex) return;
  activeIndex = index;
  const gem = GEMS[index];

  // Update menu chips
  document.querySelectorAll('.gem-chip').forEach((c, i) => {
    c.classList.toggle('active', i === index);
    c.style.setProperty('--chip-color', GEMS[i].color);
  });

  // Scroll chip into view
  const chip = menuScroll.children[index];
  chip.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

  // Show loader
  loader.classList.remove('hidden');

  // Update model
  mv.src = gem.model;

  // Update floating label
  floatEN.textContent = gem.nameEN;
  floatEN.style.color = gem.color;
  floatEN.style.textShadow = `0 0 30px ${gem.color}66`;
  floatAR.textContent = gem.nameAR;

  // Update info card
  cEmoji.textContent      = gem.icon;
  cEmoji.style.background = gem.color + '22';
  cEmoji.style.boxShadow  = `0 0 20px ${gem.color}44`;
  cEN.textContent    = gem.nameEN;
  cAR.textContent    = gem.nameAR;
  cDesc.textContent  = gem.desc;
  cHard.textContent  = gem.hardness;
  cDens.textContent  = gem.density;
  cOrig.textContent  = gem.origin;
  cHard.style.color  = gem.color;

  // Info card border accent
  document.getElementById('info-card').style.borderTopColor = gem.color + '55';

  toast(`✦ ${gem.nameAR}`);
}

/* ══════════════════════════════════════════════
   MODEL VIEWER EVENTS
══════════════════════════════════════════════ */
mv.addEventListener('load', () => {
  loader.classList.add('hidden');
});

mv.addEventListener('error', () => {
  loader.classList.add('hidden');
  toast('⚠️ تعذر تحميل النموذج', true);
});

// Check AR support
mv.addEventListener('ar-status', (e) => {
  if (e.detail.status === 'not-presenting') {
    toast('✦ مرحباً بعودتك');
  }
});

/* ══════════════════════════════════════════════
   ENTER AR
══════════════════════════════════════════════ */
function enterAR() {
  if (!mv.canActivateAR) {
    noArNote.style.display = 'block';
    setTimeout(() => { noArNote.style.display = 'none'; }, 3000);
    toast('⚠️ AR غير مدعوم على هذا الجهاز', true);
    return;
  }
  mv.activateAR();
}

/* ══════════════════════════════════════════════
   TOGGLE INFO PANEL
══════════════════════════════════════════════ */
function toggleInfo() {
  document.getElementById('info-panel').classList.toggle('collapsed');
}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
function toast(msg, isErr = false) {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className   = 'toast';
  el.textContent = msg;
  if (isErr) el.style.borderColor = 'rgba(224,17,95,0.5)';
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
function init() {
  buildMenu();

  // Populate info card with first gem
  const gem = GEMS[0];
  floatEN.textContent    = gem.nameEN;
  floatEN.style.color    = gem.color;
  floatAR.textContent    = gem.nameAR;
  cEmoji.textContent     = gem.icon;
  cEmoji.style.background = gem.color + '22';
  cEN.textContent   = gem.nameEN;
  cAR.textContent   = gem.nameAR;
  cDesc.textContent = gem.desc;
  cHard.textContent = gem.hardness;
  cDens.textContent = gem.density;
  cOrig.textContent = gem.origin;
  cHard.style.color = gem.color;
  document.getElementById('info-card').style.borderTopColor = gem.color + '55';
}

init();
</script>
</body>
</html>
